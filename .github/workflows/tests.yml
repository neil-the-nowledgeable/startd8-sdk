# ---------------------------------------------------------------------------
# ENABLED 2026-07-23 — scoped to the STABLE observability core (tests/unit/observability),
# the compare-live gate's own tests. Re-activated after being silently disabled in
# 983bf53a (2026-02-23, a byte-identical rename in an unrelated feature commit) and
# diagnosed in 664fd35d.
#
# Why this narrow scope (not all of tests/unit): during the ~5 months CI was off, the
# broader unit suite accrued two problems that make a full-suite green baseline
# unreliable TODAY —
#   1. ROT (deterministic): 85 failures across 28 files whose tests fell behind evolved
#      APIs (e.g. SourceReconciler now requires project_root) or need optional deps.
#   2. A FLAKY TAIL (nondeterministic): 1–3 DIFFERENT tests fail per full run — timing/perf
#      assertions, e2e/CLI subprocess tests, cross-module state pollution — all of which
#      PASS in isolation. xdist isolation did not resolve it (perf tests flake worse under
#      parallel CPU load).
# tests/unit/observability is verified green + fast + stable across runs, so CI starts
# honestly green and protects this session's work. The full-suite green-up (rot + flaky
# tail) is a separate initiative; the rotted files are catalogued in tests/ci_known_failing.txt
# as the widen-backlog. Widen the `Run tests` path below as that backlog is cleared.
#
# Three deselects (env-dependent tests that hard-fail instead of skipping when their toolchain/
# service is absent — as it is on a clean CI runner):
#   * test_dashboard_renderer_v2's live-Grafana round-trip — needs GRAFANA_API_TOKEN + a v2-API Grafana.
#   * test_datasource_uid_binding's 2 render tests — need startd8-mixin/vendor (populated by `jb install`,
#     a gitignored jsonnet-bundler dir absent in CI). Green locally only because the primary worktree
#     has vendor; a fresh checkout fails them. (Better long-term: give these a skip-when-vendor-absent guard.)
# ---------------------------------------------------------------------------
name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run tests (stable observability core)
      run: |
        # Deselects (env-dependent tests, no skip guard) — see header:
        #  * live-Grafana round-trip (needs GRAFANA_API_TOKEN + a v2-API Grafana)
        #  * 2 datasource-UID render tests (need startd8-mixin/vendor from `jb install` — a jsonnet
        #    toolchain absent in this CI; they hard-fail without it instead of skipping).
        pytest tests/unit/observability \
          --deselect tests/unit/observability/test_dashboard_renderer_v2.py::test_live_round_trip_preserves_timeseries_query \
          --deselect tests/unit/observability/test_datasource_uid_binding.py::test_render_binds_real_uid \
          --deselect tests/unit/observability/test_datasource_uid_binding.py::test_render_default_uses_datasource_variable \
          --cov=startd8.observability --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
