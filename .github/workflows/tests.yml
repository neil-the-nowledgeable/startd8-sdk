# ---------------------------------------------------------------------------
# ENABLED 2026-07-23 — scoped to `tests/unit` (a green baseline; ~18.5k tests
# collect cleanly, verified locally before enabling). Re-activated after being
# silently disabled in 983bf53a (2026-02-23, a byte-identical rename bundled into
# an unrelated feature commit) and diagnosed in 664fd35d.
#
# SCOPE — intentionally `tests/unit` only. A full `pytest tests/` is red at
# *collection* on 11 pre-existing modules (import errors, not test failures);
# widen the path below as each is fixed:
#   - tests/contract_validation/*.py (7) import the external `contextcore` package
#     (`contextcore.contracts`, `contextcore.generators`), NOT a startd8 dependency.
#     Fix: install contextcore in CI, or add a skip-when-absent guard.
#   - tests/test_workflow_catalog.py, tests/test_skill_aware_workflow.py,
#     tests/test_artifact_generators.py, tests/test_tui_agents.py (4) reference a
#     removed/renamed API (WORKFLOW_CATALOG / WorkflowDescriptor predate the current
#     WorkflowRegistry; SkillAwareWorkflow is no longer re-exported). Fix: update to
#     the current API.
# ---------------------------------------------------------------------------
name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run tests
      run: |
        pytest tests/unit --cov=startd8 --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
