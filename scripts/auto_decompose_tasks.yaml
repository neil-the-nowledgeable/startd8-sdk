        ## Tests to add (in a new `TestAutoDecomposeIntegration` class)

        ### test_two_file_decomposition_dry_run
        - Create two real Python files in tmp_path (a.py with a function, b.py with a class)
        - Create a workflow with dry_run=True and LoggingInstrumentor
        - Add a feature targeting both files
        - Run workflow
        - Assert: both files appear in simulated generated paths
        - Assert: feature marked COMPLETE in queue

        ### test_three_file_decomposition_dry_run
        - Create three real files: models.py, views.py, urls.py
        - Add a feature targeting all three
        - Run workflow in dry_run mode
        - Assert: 3 sub-features processed, feature is COMPLETE

        ### test_decomposition_reads_current_file_content
        - Create a file with known content ("# original content")
        - Spy on develop_feature to capture the sub_feature.description
        - Verify the description contains "# original content"

        ### test_decomposition_with_dependencies
        - Add feat-1 (single file) and feat-2 (two files, depends on feat-1)
        - Run workflow in dry_run mode
        - Assert: feat-1 completes first, then feat-2 decomposes and completes

        ### test_mixed_single_and_multi_file_features
        - Add three features: single-file, two-file, single-file
        - Run workflow in dry_run mode
        - Assert: all three complete, second one decomposes

        ## Acceptance criteria

        - All 5 tests pass with `pytest tests/contractors/test_contractors.py -v`
        - Tests exercise the full workflow.run() path (not just individual methods)
        - Tests verify queue state after completion (feature statuses)
        - No real LLM calls, all dry_run=True
      context:
