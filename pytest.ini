[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = strict
addopts = 
    -v
    --strict-markers
    --tb=short
    # Coverage options: Uncomment to enable coverage reporting
    # Requires: pip install pytest-cov
    # --cov=src/startd8
    # --cov-report=term-missing
    # --cov-report=html
    # --cov-report=xml
    # --cov-fail-under=80
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    asyncio: Async tests (pytest-asyncio)












