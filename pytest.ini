[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = strict
addopts =
    -v
    --strict-markers
    --tb=short
    # importlib import mode: test files with the same basename in different dirs no longer collide
    # in sys.modules, so a full-tree run collects EVERY test instead of silently shadowing one of
    # each duplicate-named pair (e.g. scaffold_codegen/test_scaffold.py vs repair/retry/...).
    --import-mode=importlib
    # a handful of stale test modules (importing renamed/removed symbols) must not abort the whole
    # suite's collection — report them, run everything else, still exit non-zero (CI-visible).
    --continue-on-collection-errors
    # Coverage options: Uncomment to enable coverage reporting
    # Requires: pip install pytest-cov
    # --cov=src/startd8
    # --cov-report=term-missing
    # --cov-report=html
    # --cov-report=xml
    # --cov-fail-under=80
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    asyncio: Async tests (pytest-asyncio)
    evaluation: Evaluation pipeline tests
    contract_validation: Contract propagation validation tests












