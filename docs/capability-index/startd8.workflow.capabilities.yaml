# StartD8 Workflow Capabilities Manifest
# Version: 2.0.0
# Created: 2026-01-28
# Updated: 2026-01-30
#
# PURPOSE: Capability design for StartD8 SDK workflow system.
# Implements functional requirements from Phase 3 (startd8.workflow.functional-requirements.yaml).
#
# SCHEMA: Phase 4 from WORKFLOW_DEVELOPER_ROADMAP_PROMPT.md
# COMPLEMENT: startd8.workflow.benefits.yaml, startd8.workflow.gap-analysis.md

manifest_id: startd8.workflow.capabilities
name: StartD8 Workflow System Capabilities
version: "2.8.0"
description: |
  Capabilities for StartD8 SDK workflow system.
  Protocol-based multi-agent orchestration with cost tracking and observability.
  v2.8.0: ImplementPhaseHandler wired to LeadContractorCodeGenerator — real code generation, file reads, dep context.
  v2.7.0: FinalizePhaseHandler enriched with artifact checksums, cross-phase task-ID join, and overall status rollup.
  v2.6.0: Dual-document architectural review, ContextCore task tracking emitter, design quality context enrichment.
  v2.5.0: Added domain preflight integration into PrimeContractor for domain-aware constraints and post-validation.
  v2.4.0: Added artisan contractor orchestrator and design handoff for two-half split execution.
  v2.3.0: Added architectural_review_log builtin workflow with automated triage + two-tier prompt steering.
  v2.2.0: Added plan_ingestion builtin workflow capability.
  v2.1.0: All 13 draft capabilities promoted to beta after Phase 1-4 implementation.
  v2.0.0: Updated from Phase 3 functional requirements with implementation details.

owner: neilyashinsky
repository: https://github.com/neilyashinsky/startd8-sdk

labels:
  domain: workflow-orchestration
  tier: sdk
  audience: developer

manifest_tokens: 800
index_tokens: 6000

