  - capability_id: startd8.workflow.builtin.plan_ingestion
    category: action
    maturity: beta
    summary: "Parse generic plans → assess complexity → route to Prime/Artisan → refine → emit with optional ContextCore task tracking"
    audiences: [workflow_user, ai_agent, workflow_developer]
    user_benefit: "Automate plan-to-SDK-format conversion with LLM complexity scoring and ContextCore-ready task artifacts"
    delivers_benefit: workflow.execution.validated_run
    description:
      developer: |
        PlanIngestionWorkflow: 5-phase pipeline (parse → assess → transform → refine → emit).
        LLM extracts features/deps, scores 7 complexity dimensions 0-100, routes to Prime (≤40)
        or Artisan (>40). Transforms to task YAML or plan markdown. Refines via N rounds of
        ArchitecturalReviewLogWorkflow. Emits review-config.json. Cost tracking with warn/max limits.
        v2.6.0: Optional ContextCore task tracking artifact generation — emits epic/story/task
        state files, NDJSON event logs (task.created zero-point), and tracking manifests via
        emit_task_tracking_artifacts(). Opt-in via generate_task_tracking=True config.
        Design quality enrichment: _derive_architectural_context() extracts manifest goals,
        constraints, shared modules, dependency clusters; _derive_design_calibration() assigns
        per-task depth tiers (brief ≤50 LOC, standard 51-150, comprehensive >150).
      user: |
        Convert any plan.md into SDK-native format:
        startd8 workflow run plan-ingestion --plan_path plan.md --output_dir ./out
        With task tracking: --generate_task_tracking --project_id my-project
      agent: |
        workflow_id: "plan-ingestion". Config: {plan_path, output_dir, review_rounds, force_route,
        complexity_threshold, assessor_agent, transformer_agent, generate_task_tracking, project_id,
        sprint_id, install_to_contextcore, emit_ndjson_events}. Returns PlanIngestionResult.
        result.output["task_tracking"] contains emitted artifact paths when enabled.
    evidence:
      - type: code
        ref: src/startd8/workflows/builtin/plan_ingestion_workflow.py
        description: "PlanIngestionWorkflow with 5-phase pipeline + task tracking + design quality enrichment"
      - type: code
        ref: src/startd8/workflows/builtin/plan_ingestion_models.py
        description: "Data models: ParsedPlan, ComplexityScore, IngestionState, PlanIngestionResult, TaskTrackingConfig"
      - type: code
        ref: src/startd8/workflows/builtin/task_tracking_emitter.py
        description: "emit_task_tracking_artifacts(): epic/story/task state files, NDJSON events, tracking manifest"
      - type: test
        ref: tests/unit/test_plan_ingestion_workflow.py
        description: "55+ unit tests covering all phases, routing, cost limits, context_files"
      - type: test
        ref: tests/unit/test_task_tracking_emitter.py
        description: "Task tracking emitter tests: state files, NDJSON events, manifest generation"

  - capability_id: startd8.workflow.builtin.architectural_review_log
    category: action
    maturity: stable
    summary: "Convergent Review Protocol (CRP): iterative multi-agent architectural review with domain coverage convergence and dual-document mode"
    audiences: [workflow_user, ai_agent, workflow_developer]
    user_benefit: "Automated multi-round design review that converges toward full domain coverage with persistent acceptance/rejection tracking"
    delivers_benefit: workflow.execution.validated_run
    protocol: "Convergent Review Protocol (CRP)"
    requirements_doc: docs/ARCHITECTURAL_REVIEW_REQUIREMENTS.md
    requirements_yaml: docs/capability-index/startd8.architectural-review.functional-requirements.yaml
    description:
      developer: |
        ArchitecturalReviewLogWorkflow implements the Convergent Review Protocol (CRP):
        N reviewer agents append structured suggestions (7-column schema) to Appendix C,
        automated triage classifies as ACCEPT/REJECT into Appendix A/B, computes per-area
        coverage across 7 domains (Architecture, Interfaces, Data, Risks, Validation, Ops,
        Security), and inserts "Areas Substantially Addressed" + "Areas Needing Further Review"
        sections. Two-tier prompt steering prioritizes uncovered areas with quantified gap data.
        Process converges as areas cross the substantially-addressed threshold; enters
        gap-hunting mode when all areas are covered.
        v2.6.0: Dual-document mode when feature_requirements points to a .md file — reviewers
        produce Requirements Coverage mappings and split suggestions: S-prefix IDs for plan doc,
        F-prefix IDs for feature doc. Triage routes to appropriate document appendices. Feature
        doc auto-initialized with Appendix A/B/C structure if missing.
        See docs/ARCHITECTURAL_REVIEW_REQUIREMENTS.md for 76 formal requirements (RV-xxx).
      user: |
        Run iterative architectural review with automated triage:
        startd8 workflow run architectural-review-log --document_path plan.md --reviewer_count 2
        Dual-document mode (reviews plan against feature spec):
        startd8 workflow run architectural-review-log --document_path plan.md --feature_requirements spec.md
      agent: |
        workflow_id: "architectural-review-log". Config: {document_path, reviewer_count,
        max_suggestions, scope, enable_triage, substantially_addressed_threshold, max_cost_usd,
        warn_cost_usd, context_files, gemini_safety_settings, feature_requirements, quality_tier}.
        Triage output in result.output["triage"]. Dual-doc: S-prefix → plan appendices, F-prefix → feature appendices.
    evidence:
      - type: code
        ref: src/startd8/workflows/builtin/architectural_review_log_workflow.py
        description: "ArchitecturalReviewLogWorkflow with automated triage, two-tier prompt steering, and dual-document mode"
      - type: test
        ref: tests/unit/test_architectural_review_triage.py
        description: "87 unit tests covering triage helpers, area coverage, prompt priority, dual-document mode, integration"
      - type: test
        ref: tests/unit/test_gemini_safety_filter.py
        description: "29 tests for Gemini SAFETY retry, validation retry, code fence stripping"

  - capability_id: startd8.workflow.contractor.artisan_orchestrator
    category: action
    maturity: beta
    summary: "7-phase artisan workflow orchestrator with cost budget, checkpoints, design quality context, and OTel tracing"
    audiences: [workflow_user, ai_agent, workflow_developer]
    user_benefit: "Structured multi-phase code generation with design quality calibration and explicit review before implementation"
    delivers_benefit: workflow.execution.validated_run
    description:
      developer: |
        ArtisanContractorWorkflow: 7-phase orchestrator (PLAN → SCAFFOLD → DESIGN → IMPLEMENT →
        TEST → REVIEW → FINALIZE). Phase handlers registered via ContextSeedHandlers.create_all().
        3-tier cost model architecture: Haiku drafter, Sonnet validator, Opus reviewer (default
        runtime 2-tier: Haiku+Opus via HandlerConfig; Sonnet tier activable via --lead-agent). Supports phase subsets,
        cost budget enforcement, per-phase and total timeouts, checkpoint persistence, OTel tracing.
        v2.6.0: DesignPhaseHandler enriched with architectural context (manifest goals, constraints,
        shared modules, dependency clusters, import conventions, domain concepts) and per-task
        design calibration (depth tiers: brief ≤50 LOC / standard 51-150 / comprehensive >150
        with section count and max_output_tokens scaling). Context flows via seed architectural_context
        and design_calibration keys.
        v2.7.0: FinalizePhaseHandler enriched — artifacts include sha256, line_count, domain;
        cost summary aggregates implementation + test + review phases; manifest includes per-task
        status rollup (generation/test/review joined by task_id); report includes overall status
        (success/partial/failed) with tasks_succeeded/tasks_failed counts.
        v2.8.0: ImplementPhaseHandler fully wired to LeadContractorCodeGenerator.
        _resolve_generator(project_root) creates generator with HandlerConfig params + output_dir.
        _build_task_context() reads existing files (60KB cap) and dependency output files.
        _generate_for_task() calls generator.generate() and reports cost/tokens/iterations.
        execute() removes NotImplementedError safety net — all paths now live.
      user: |
        Run full artisan workflow:
        python3 scripts/run_artisan_workflow.py --seed seed.json --output-dir out/ --cost-budget 10
        Design only: python3 scripts/run_artisan_design_only.py --seed seed.json --output-dir out/
        Implement only: python3 scripts/run_artisan_implement_only.py --handoff out/design-handoff.json
      agent: |
        ArtisanContractorWorkflow(config=WorkflowConfig(...), phases=[WorkflowPhase.PLAN, ...]).
        register_handler(phase, handler). execute(context={"enriched_seed_path": "..."}). Returns
        WorkflowResult with per-phase cost, status, duration. Phases configurable via HandlerConfig.
