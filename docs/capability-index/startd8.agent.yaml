manifest_id: startd8.agent
name: StartD8 LLM Orchestration Capabilities
version: "1.0.0"
description: |
  Multi-LLM provider abstraction framework with cost tracking, workflow
  orchestration, multi-phase code generation, and OpenTelemetry observability.
  Beaver (Amik) in the ContextCore expansion pack ecosystem.

owner: force-multiplier-labs
repository: https://github.com/neilyashinsky/startd8-sdk
labels:
  domain: llm-orchestration
  tier: sdk
  audience: agent
  ecosystem: contextcore-beaver
manifest_tokens: 600
index_tokens: 5000

# =============================================================================
# CAPABILITIES (47 total)
# =============================================================================

capabilities:

  # ===========================================================================
  # MULTI-LLM GENERATION — Unified interface to 6 providers
  # ===========================================================================

  - capability_id: startd8.agent.generate
    category: action
    maturity: stable
    summary: Send prompts to any LLM provider through a unified async interface
    audiences:
      - agent
      - human
    description:
      agent: |
        agent = resolve_agent_spec("anthropic:claude-sonnet-4-5-20250929").
        result = await agent.agenerate(prompt, system_prompt="...").
        result.text, result.time_ms, result.token_usage. Backward-compatible tuple unpacking.
      human: |
        All agents (Claude, GPT-4, Gemini, Mistral, Ollama, Mock) share the same
        agenerate()/generate() interface. Supports instance-level and per-call system
        prompts. Returns GenerateResult with text, timing, and token usage.
    triggers:
      - generate text
      - llm request
      - send prompt
      - agenerate
      - agent response
    inputs:
      type: object
      required:
        - prompt
      properties:
        prompt:
          type: string
          description: The prompt to send to the LLM
        system_prompt:
          type: string
          description: Optional per-call system prompt override
    outputs:
      type: object
      properties:
        text:
          type: string
        time_ms:
          type: integer
        token_usage:
          type: object
          properties:
            input_tokens: { type: integer }
            output_tokens: { type: integer }
    evidence:
      - type: code
        ref: src/startd8/agents/base.py
        description: BaseAgent protocol with agenerate()/generate()
      - type: code
        ref: src/startd8/agents/claude.py
        description: ClaudeAgent implementation
      - type: code
        ref: src/startd8/agents/openai.py
        description: GPT4Agent implementation
      - type: code
        ref: src/startd8/agents/gemini.py
        description: GeminiAgent implementation
      - type: test
        ref: tests/unit/test_agents.py
        description: 7 tests for system_prompt, 13 tests for GenerateResult
    confidence: 0.95
    anti_patterns:
      - Never call provider APIs directly — use resolve_agent_spec() for consistency
      - Don't assume response format differs by provider — GenerateResult normalizes all
    discovery_paths:
      - If you need to call an LLM, start here. resolve_agent_spec() handles provider routing.
      - If you need to switch models, change the spec string — no code changes needed.

  - capability_id: startd8.provider.registry
    category: integration
    maturity: stable
    summary: Dynamic provider discovery via entry points with 6 registered providers
    audiences:
      - agent
      - human
    description:
      agent: |
        ProviderRegistry.discover(). ProviderRegistry.get_provider("anthropic").
        ProviderRegistry.list_providers() -> ["anthropic", "openai", "ollama", "gemini", "mistral", "mock"].
        Each provider: validate_config(), create_agent(), list_models().
      human: |
        Auto-discovers LLM providers from Python entry points. Six built-in providers:
        Anthropic (Claude), OpenAI (GPT), Google (Gemini), Mistral, Ollama (local), Mock.
        Third-party providers work after pip install — no code changes.
    triggers:
      - provider registry
      - discover providers
      - list providers
      - add provider
    evidence:
      - type: code
        ref: src/startd8/providers/registry.py
        description: ProviderRegistry with entry_point discovery
      - type: code
        ref: src/startd8/providers/protocol.py
        description: Provider protocol interface
    confidence: 0.95
    discovery_paths:
      - If you need to add a new LLM provider, implement the Provider protocol and register via entry points.
      - If you need to check which providers are available, use ProviderRegistry.list_providers().

