# =============================================================================
# DESIGN PRINCIPLES (10 total)
# =============================================================================

design_principles:

  - id: provider_abstraction
    principle: |
      All provider-specific logic is isolated behind a common interface.
      New providers can be added without changing application code.
    rationale: |
      Provider APIs differ in auth, model naming, sampling parameters, and response
      formats. By centralizing these differences behind the Provider protocol,
      applications become provider-agnostic and can migrate or multi-provider
      without code changes.
    anti_patterns:
      - Provider-specific code scattered across business logic
      - Hardcoded API endpoints or model names in application code
      - Importing provider SDKs directly instead of using resolve_agent_spec()
    applies_to:
      - startd8.agent.generate
      - startd8.provider.registry
      - startd8.agent.resolution
      - startd8.provider.model_catalog

  - id: cost_transparency
    principle: |
      Every LLM call includes cost attribution: tokens used, price per token, USD cost.
      Cost is a first-class observable, not an afterthought.
    rationale: |
      Cost is invisible in many LLM SDKs, leading to budget surprises. Making cost
      explicit at every level (per-call, per-workflow, per-session) enables teams to
      optimize, forecast, and set guardrails before costs escalate.
    anti_patterns:
      - Ignoring cost until post-hoc billing analysis
      - Estimating cost from token counts without provider-specific pricing
      - Running workflows without budget limits
    applies_to:
      - startd8.cost.tracking
      - startd8.cost.budget
      - startd8.cost.analytics
      - startd8.observability.session_tracking

  - id: two_tier_generation
    principle: |
      Code generation uses a lead/drafter pattern: an expensive model creates the
      specification, a cheaper model writes the code.
    rationale: |
      Using a flagship model for everything is wasteful. The intellectual work (spec
      creation, architecture decisions) benefits from the best model, but the
      mechanical work (code writing from a clear spec) can be done by a cheaper model.
      This reduces cost by 60-80% without quality loss.
    anti_patterns:
      - Using the most expensive model for all generation tasks
      - Generating code without a specification step
      - Skipping review between spec creation and implementation
    applies_to:
      - startd8.workflow.builtin.lead_contractor
      - startd8.workflow.builtin.artisan
      - startd8.codegen.design_handoff

  - id: proactive_truncation_prevention
    principle: |
      Estimate output size BEFORE generation. Prevent truncation proactively
      rather than detecting it after wasting tokens.
    rationale: |
      LLM truncation wastes tokens and produces broken code. Pre-flight estimation
      catches oversized tasks before generation begins, enabling decomposition or
      constraint adjustment. Post-hoc detection is the fallback, not the primary defense.
    anti_patterns:
      - Generating first, detecting truncation after
      - Ignoring truncation warnings and proceeding anyway
      - Setting max_tokens without estimating actual output size
    applies_to:
      - startd8.codegen.truncation_detection
      - startd8.codegen.domain_preflight

  - id: progressive_disclosure
    principle: |
      Information is layered: manifest headers (~400 tokens), lightweight index
      (~2500 tokens), full details (on demand). Agents pay only for what they need.
    rationale: |
      Context windows are finite. Loading full workflow definitions when only a
      list is needed wastes tokens and money. The three-tier structure (manifest →
      index → detail) enables efficient discovery while preserving depth.
    anti_patterns:
      - Loading all workflow definitions upfront
      - Requiring code inspection to discover workflow capabilities
      - Flat, monolithic documentation that must be read entirely
    applies_to:
      - startd8.workflow.discover
      - startd8.integration.mcp_gateway
      - startd8.cli.benchmark

  - id: resilience_by_default
    principle: |
      Preset resilience levels (OFF through AGGRESSIVE) make fault tolerance
      a configuration choice, not an implementation burden.
    rationale: |
      LLM APIs are inherently unreliable — rate limits, timeouts, transient failures.
      Most applications need retry, circuit breaker, and backpressure. Preset levels
      make it easy to get started; fine-grained config is available when needed.
    anti_patterns:
      - No retry logic on LLM calls
      - Custom retry implementations that ignore backoff and jitter
      - Treating rate limit errors the same as authentication errors
    applies_to:
      - startd8.resilience.config
      - startd8.resilience.rate_limiter

  - id: workflow_protocol
    principle: |
      All workflows implement a common protocol (validate_config, run/arun, metadata).
      The registry is the single entry point for discovery and execution.
    rationale: |
      A consistent interface enables the registry, CLI, MCP gateway, and REST API
      to work with any workflow — builtin or third-party. Adding new workflows
      requires implementing the protocol, not modifying the framework.
    anti_patterns:
      - Workflows with incompatible interfaces
      - Bypassing the registry to call workflow classes directly
      - Workflow-specific execution code in the CLI or API layer
    applies_to:
      - startd8.workflow.execute
      - startd8.workflow.discover
      - startd8.workflow.scaffold
      - startd8.workflow.pipeline

  - id: observable_by_default
    principle: |
      Every LLM call emits OTel spans with gen_ai.* attributes. Session metrics,
      cost tracking, and event bus are always available — no opt-in required.
    rationale: |
      Observability debt accumulates silently. By instrumenting everything from the
      start, teams have visibility from day one. Graceful degradation ensures zero
      overhead when OTel is not configured.
    anti_patterns:
      - Adding observability as an afterthought
      - Requiring explicit instrumentation calls around every agent invocation
      - Using logging.getLogger() instead of get_logger() (misses Loki)
    applies_to:
      - startd8.observability.otel_config
      - startd8.observability.tracked_agent
      - startd8.observability.session_tracking
      - startd8.observability.otel_logging
      - startd8.observability.workflow_events

  - id: convergent_review
    principle: |
      Multi-agent review processes converge toward coverage by tracking addressed
      domains and prioritizing gaps in subsequent rounds.
    rationale: |
      Naive multi-agent review produces duplicate feedback on obvious issues while
      missing important domains. The Convergent Review Protocol (CRP) tracks 7
      coverage domains and steers reviewers toward gaps, ensuring comprehensive
      analysis within a bounded number of rounds.
    anti_patterns:
      - Multiple reviewers covering the same obvious issues
      - No tracking of which domains have been addressed
      - Unbounded review rounds without convergence criteria
    applies_to:
      - startd8.workflow.builtin.architectural_review
      - startd8.workflow.builtin.iterative_dev
      - startd8.workflow.builtin.critical_review

  - id: contextcore_native
    principle: |
      StartD8 workflows are ContextCore-aware: they emit spans with project context,
      discover tasks from state files, and produce tracking artifacts.
    rationale: |
      ContextCore models tasks as OTel spans. By integrating natively, StartD8
      workflows appear in project dashboards alongside manual task tracking.
      This closes the loop between task planning and automated execution.
    anti_patterns:
      - Running workflows without project context
      - Manual task status updates when automation is available
      - Separate observability stacks for workflow execution and project tracking
    applies_to:
      - startd8.integration.contextcore
      - startd8.workflow.builtin.plan_ingestion

# =============================================================================
# PATTERNS (8 total)
# =============================================================================

patterns:

  - pattern_id: multi_provider_routing
    name: Multi-Provider Routing
    summary: Route requests to different providers based on model tier, cost, or latency constraints
    capabilities:
      - startd8.agent.generate
      - startd8.provider.registry
      - startd8.provider.model_catalog
      - startd8.agent.resolution
    anti_pattern: Implementing provider selection as a giant if/elif chain in application code

  - pattern_id: cost_aware_generation
    name: Cost-Aware Generation
    summary: Budget-gated code generation with two-tier model routing and pre-flight size estimation
    capabilities:
      - startd8.cost.tracking
      - startd8.cost.budget
      - startd8.workflow.builtin.lead_contractor
      - startd8.codegen.truncation_detection
    anti_pattern: Generating code with expensive models without budget limits or size estimation

  - pattern_id: structured_code_generation
    name: Structured Code Generation
    summary: Multi-phase code generation with design review, domain constraints, and handoff files
    capabilities:
      - startd8.workflow.builtin.artisan
      - startd8.codegen.design_handoff
      - startd8.codegen.domain_preflight
      - startd8.codegen.truncation_detection
      - startd8.codegen.code_extraction
    anti_pattern: Single-shot code generation without specification, review, or validation

  - pattern_id: workflow_pipeline
    name: Workflow Pipeline
    summary: Chain multiple agents with data transformation, progress tracking, and cost accounting
    capabilities:
      - startd8.workflow.execute
      - startd8.workflow.pipeline
      - startd8.observability.workflow_events
      - startd8.cost.tracking
    anti_pattern: Manual agent orchestration with ad-hoc state passing between steps

  - pattern_id: convergent_review_protocol
    name: Convergent Review Protocol
    summary: Iterative multi-agent review with domain coverage tracking and automated triage
    capabilities:
      - startd8.workflow.builtin.architectural_review
      - startd8.workflow.builtin.iterative_dev
      - startd8.workflow.builtin.critical_review
    anti_pattern: Unstructured multi-agent review producing duplicate feedback on obvious issues

  - pattern_id: observable_llm_operations
    name: Observable LLM Operations
    summary: Full OTel stack (traces, metrics, logs) for every LLM call with gen_ai.* conventions
    capabilities:
      - startd8.observability.otel_config
      - startd8.observability.tracked_agent
      - startd8.observability.session_tracking
      - startd8.observability.otel_logging
      - startd8.observability.workflow_events
    anti_pattern: LLM operations without observability — invisible failures and cost surprises

  - pattern_id: contextcore_task_automation
    name: ContextCore Task Automation
    summary: Discover tasks from ContextCore state files, execute via workflows, emit tracking artifacts
    capabilities:
      - startd8.integration.contextcore
      - startd8.workflow.execute
      - startd8.workflow.builtin.plan_ingestion
    anti_pattern: Manual task discovery and status updates when ContextCore state files exist

  - pattern_id: resilient_provider_access
    name: Resilient Provider Access
    summary: Rate-limited, circuit-broken LLM calls with configurable retry and backpressure
    capabilities:
      - startd8.resilience.config
      - startd8.resilience.rate_limiter
      - startd8.agent.generate
    anti_pattern: Raw API calls without retry, rate limiting, or circuit breaker protection

