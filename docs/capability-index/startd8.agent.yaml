          retry_config=RetryConfig(max_attempts=5)).
        resolve_agents(["anthropic:claude-sonnet-4-5-20250929", "openai:gpt-4o"]).
      human: |
        Parses "provider:model" spec strings into configured agent instances.
        Supports legacy aliases, bare model IDs, timeout and retry config forwarding.
        All 5 providers accept forwarded config.
    triggers:
