# =============================================================================
# StartD8 Agent Capability Index
# =============================================================================
# Unified agent-discoverable manifest for the StartD8 SDK (Beaver/Amik).
# Synthesized from 25,398 raw capabilities extracted 2026-02-18.
#
# Source manifests consolidated:
#   - startd8.sdk.capabilities.yaml (15 capabilities)
#   - startd8.workflow.capabilities.yaml (34 capabilities)
#   - startd8.observability.manifest.yaml (12 metrics, 15 spans)
