      human: |
        Strips markdown fences, preamble, and explanatory notes from LLM responses.
        Language-aware extraction for Python, TypeScript, Go, Rust, YAML, and more.
        Multi-file extraction splits responses into individual file contents.
    triggers:
      - extract code
      - code block
      - markdown fence
      - parse llm output
    evidence:
      - type: code
        ref: src/startd8/utils/code_extraction.py
        description: extract_code_from_response(), extract_multi_file_code()
    confidence: 0.85

