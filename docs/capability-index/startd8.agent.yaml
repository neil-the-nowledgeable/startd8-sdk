  # ===========================================================================
  # COST INTELLIGENCE — Track, budget, and forecast LLM spending
  # ===========================================================================

  - capability_id: startd8.cost.tracking
    category: action
    maturity: stable
    summary: Track per-call LLM costs across providers with token accounting
    audiences:
      - agent
      - human
    description:
      agent: |
        from startd8.costs import CostTracker. tracker = CostTracker().
        tracker.record(model, input_tokens, output_tokens). tracker.get_summary().
        PricingService provides per-model rates. OTel metrics: startd8.cost.total,
        startd8.cost.input_tokens, startd8.cost.output_tokens, startd8.cost.per_request.
      human: |
        Automatically tracks the cost of every LLM call. Knows pricing for all
        supported models. Exports to Prometheus/OTel metrics for Grafana dashboards.
        Integrates with BudgetManager for spending limits.
    triggers:
      - cost tracking
      - token cost
      - llm cost
      - pricing
      - spending
    inputs:
      type: object
      required:
        - model
        - input_tokens
        - output_tokens
      properties:
        model:
          type: string
        input_tokens:
          type: integer
        output_tokens:
          type: integer
    outputs:
      type: object
      properties:
        cost_usd:
          type: number
        cumulative_cost:
          type: number
    evidence:
      - type: code
        ref: src/startd8/costs/tracker.py
        description: CostTracker with per-model pricing
      - type: code
        ref: src/startd8/costs/pricing.py
        description: PricingService with model rate lookups
      - type: code
        ref: src/startd8/costs/otel_metrics.py
        description: OTel cost metrics export (4 metrics)
      - type: test
        ref: tests/costs/
        description: Cost tracking test suite
    confidence: 0.90
    discovery_paths:
      - If you need to know how much an LLM call cost, CostTracker records it automatically.
      - If you need cost data in Grafana, enable OTel metrics export.

  - capability_id: startd8.cost.budget
    category: action
    maturity: stable
    summary: Enforce spending limits with warning and maximum thresholds
    audiences:
      - agent
      - human
    description:
      agent: |
        from startd8.costs import BudgetManager. manager = BudgetManager(warn=5.0, max=10.0).
        manager.check(cost) raises BudgetExceeded or emits BUDGET_WARNING.
        UsageLimitManager for per-user/team quota enforcement.
      human: |
        Set warn and max budget limits. Get warnings before hitting limits.
        Per-user and per-team quotas prevent runaway spending. Emits events
        for integration with alerting systems.
    triggers:
      - budget limit
      - spending limit
      - usage quota
      - cost control
    evidence:
      - type: code
        ref: src/startd8/costs/budget.py
        description: BudgetManager with warn/max limits and events
      - type: code
        ref: src/startd8/costs/usage_limits.py
        description: UsageLimitManager for per-user/team quotas
    confidence: 0.85

  - capability_id: startd8.cost.analytics
