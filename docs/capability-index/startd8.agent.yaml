  # ===========================================================================
  # CODE GENERATION CONTRACTS — Size estimation and truncation prevention
  # ===========================================================================

  - capability_id: startd8.codegen.truncation_detection
    category: action
    maturity: stable
    summary: Detect truncated LLM responses with code-aware confidence scoring
    audiences:
      - agent
      - human
    description:
      agent: |
        from startd8.truncation_detection import detect_truncation, estimate_output_size.
        result = detect_truncation(text). result.is_truncated, result.confidence, result.indicators.
        Pre-flight: estimate = estimate_output_size(task). estimate.lines, estimate.tokens.
      human: |
        Detects when an LLM response was cut off mid-generation. Code-aware mode
        checks for unclosed brackets, missing return statements, etc. Pre-flight
        estimation prevents truncation before it happens.
    triggers:
      - truncation detection
      - truncated response
      - output size estimation
      - pre-flight check
    evidence:
      - type: code
        ref: src/startd8/truncation_detection.py
        description: detect_truncation(), estimate_output_size(), confidence thresholds
      - type: doc
        ref: docs/PATTERN-truncation-detection.md
        description: Truncation detection pattern documentation
    confidence: 0.90
    discovery_paths:
      - If generated code looks incomplete, run truncation detection before re-generating.
      - If tasks are large, estimate output size before generation to avoid waste.

