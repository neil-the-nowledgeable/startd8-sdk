# StartD8 Artisan Contractor Functional Requirements
# Version: 1.0.0
# Created: 2026-02-14
#
# PURPOSE: Formal functional requirements for the Artisan Contractor Workflow,
# covering current implementation, identified ContextCore data flow fixes, and
# planned-but-unbuilt features from PLAN-artisan-contractor.md.
#
# FORMAT: Matches startd8.workflow.functional-requirements.yaml (FR-xxx) pattern.
# NAMESPACE: AR-xxx (Artisan Requirements)
# STATUS: Each requirement tagged as implemented | partial | planned
#
# INPUT: docs/PLAN-artisan-contractor.md, docs/ARTISAN_WORKFLOW_GUIDE.md,
#        docs/plans/ARTISAN_CONTEXTCORE_DATA_FLOW_FIXES.md, code audit 2026-02-14
# OUTPUT: Traceable requirements for Phase Behavior, Orchestration, ContextCore
#         Data Flow, Cost Model, Handoff/Recovery, Observability, Configuration,
#         and Safety/Resilience.

manifest_id: startd8.artisan.functional_requirements
version: "1.0.0"

# ==============================================================================
# LAYER: PHASE BEHAVIOR (AR-1xx)
# Per-phase input/behavior/output contracts for the 8-phase pipeline
# ==============================================================================

phase_behavior_requirements:

  # ---------------------------------------------------------------------------
  # PLAN Phase (AR-100 – AR-104)
  # ---------------------------------------------------------------------------

  - id: AR-100
    description: "PLAN phase loads enriched context seed JSON and populates shared workflow context"
    status: implemented
    type: phase_behavior

    acceptance_criteria:
      - "Reads enriched seed JSON from the path in context['enriched_seed_path']"
      - "Parses seed_data['tasks'] into list[SeedTask] via _parse_seed_tasks()"
      - "Topologically sorts tasks by depends_on relationships"
      - "Applies optional task_filter from context to restrict task set"
      - "Sets context keys: tasks, task_index, plan_title, plan_goals, domain_summary"
      - "Sets context keys: preflight_summary, total_estimated_loc, architectural_context"
      - "Sets context keys: design_calibration, example_artifacts"
      - "Returns cost=0.0 (no LLM calls)"

    depends_on: []

    implementation_hints:
      file: src/startd8/contractors/context_seed_handlers.py
      class: PlanPhaseHandler
      lines: "438-547"

    verified_by:
      - tests/unit/contractors/test_artisan_plan_deconstruction.py

  - id: AR-101
    description: "PLAN phase detects preflight failures and optionally aborts"
    status: implemented
    type: phase_behavior

    acceptance_criteria:
      - "Extracts check_summary from seed_data['_preflight']"
      - "Counts fail_count from check_summary"
      - "Logs warning when fail_count > 0"
      - "Raises ValueError when fail_count > 0 AND context['abort_on_preflight_fail'] is True"
      - "Continues normally when fail_count > 0 but abort_on_preflight_fail is False or unset"

    depends_on: [AR-100]

    implementation_hints:
      file: src/startd8/contractors/context_seed_handlers.py
      class: PlanPhaseHandler
      lines: "536-545"

    verified_by:
      - tests/unit/contractors/test_artisan_plan_deconstruction.py

  - id: AR-102
    description: "PLAN phase computes per-domain task distribution"
    status: implemented
    type: phase_behavior

    acceptance_criteria:
      - "Iterates all filtered tasks and counts occurrences per task.domain"
      - "Stores domain counts in context['domain_summary'] as dict[str, int]"
      - "Logs task count, domain count, and preflight failure count"

    depends_on: [AR-100]

    implementation_hints:
      file: src/startd8/contractors/context_seed_handlers.py
      class: PlanPhaseHandler
      lines: "490-534"

    verified_by:
      - tests/unit/contractors/test_artisan_plan_deconstruction.py

