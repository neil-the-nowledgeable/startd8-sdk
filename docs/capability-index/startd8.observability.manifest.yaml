slo_templates:
- name: availability
  description: Agent call success rate over a rolling window
  metric: startd8_requests_total
  query: "1 - (\n  sum(rate(startd8_requests_total{status=\"error\"}[{{window}}]))\n\
    \  /\n  sum(rate(startd8_requests_total[{{window}}]))\n)\n"
  target: 0.99
  window: 30d
- name: latency_p95
  description: 95th percentile response time under threshold
  metric: startd8_response_time_ms
  query: 'histogram_quantile(0.95, sum(rate(startd8_response_time_ms_bucket[{{window}}]))
    by (le))

    '
  target: 5000
  window: 7d
- name: cost_per_day
  description: Daily cost stays under budget
  metric: startd8_cost_total
  query: 'sum(increase(startd8_cost_total[1d]))

    '
  target: 50.0
  window: 1d
alert_templates:
- name: high_truncation_rate
  description: Alert when truncation rate exceeds 10% of requests
  severity: warning
  metric: startd8_truncations_total
  expr: 'rate(startd8_truncations_total[5m])

    /

    rate(startd8_requests_total[5m])

    > 0.10

    '
  for_duration: 5m
- name: context_near_capacity
  description: Alert when any session exceeds 90% context usage
  severity: warning
  metric: startd8_context_usage_ratio
  expr: 'startd8_context_usage_ratio > 0.90

    '
  for_duration: 2m
- name: budget_exceeded
  description: Alert when daily cost exceeds budget threshold
  severity: critical
  metric: startd8_cost_total
  expr: 'sum(increase(startd8_cost_total[1d])) > 100

    '
  for_duration: 1m
