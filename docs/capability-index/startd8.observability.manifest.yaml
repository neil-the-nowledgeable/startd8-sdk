spans:
- name_pattern: agentic.session
  kind: INTERNAL
  source_file: src/startd8/agents/agentic.py
  attributes:
  - agentic.provider
  - agentic.model
  - agentic.tool_format
  - agentic.tool_count
  - agentic.streaming
  - agentic.stop_reason
  - agentic.turns
  - agentic.total_tokens
  - agentic.total_cost_usd
  - gen_ai.system
  - gen_ai.request.model
  - gen_ai.usage.input_tokens
  - gen_ai.usage.output_tokens
  - io.contextcore.project.id
  - io.contextcore.task.id
  category: ai_agent_observability
  orientation: system
- name_pattern: agentic.turn
  kind: INTERNAL
  source_file: src/startd8/agents/agentic.py
  attributes:
  - agentic.turn
  - agentic.tool_calls
  - agentic.stop_reason
  category: ai_agent_observability
  orientation: system
- name_pattern: agentic.tool_call
  kind: INTERNAL
  source_file: src/startd8/agents/agentic.py
  attributes:
  - agentic.tool
  - agentic.tool_ok
  - agentic.tool_truncated
  category: ai_agent_observability
  orientation: system
- name_pattern: agentic.compaction
  kind: INTERNAL
  source_file: src/startd8/agents/agentic.py
  attributes:
  - agentic.compaction_attempt
  category: ai_agent_observability
  orientation: system
- name_pattern: agent.generate:{agent_name}
  kind: CLIENT
  source_file: src/startd8/agents/tracked.py
  attributes:
  - agent.id
  - agent.model
  - agent.prompt_length
  - agent.response_time_ms
  - agent.response_length
  - agent.tokens_input
  - agent.tokens_output
  - agent.tokens_total
  - agent.truncated
  - task.id
  - project.id
  - gen_ai.system
  - gen_ai.operation.name
  - gen_ai.response.finish_reasons
  events:
  - truncation_detected
  category: ai_agent_observability
  orientation: system
- name_pattern: workflow.{workflow_id}
  kind: INTERNAL
  source_file: src/startd8/workflows/base.py
  attributes:
  - workflow.id
  - workflow.name
  - workflow.version
  - workflow.success
  category: pipeline_innate
  orientation: system
- name_pattern: pipeline.{name}
  kind: INTERNAL
  source_file: src/startd8/orchestration.py
  attributes:
  - pipeline.name
  - pipeline.id
  - step.count
  - pipeline.total_tokens
  - pipeline.total_cost
  - pipeline.total_time_ms
  category: pipeline_innate
  orientation: system
- name_pattern: pipeline.{name}.step.{step_name}
  kind: INTERNAL
  source_file: src/startd8/orchestration.py
  attributes:
  - step.name
  - step.index
  - agent.name
  - agent.model
  - tokens
  - cost
  - response_time_ms
  - retry_count
  category: pipeline_innate
  orientation: system
- name_pattern: '{caller_defined_name}'
  kind: INTERNAL
  source_file: src/startd8/contractors/adapters/contextcore.py
  attributes:
  - project.id
  - agent.id
  attributes_dynamic: true
  category: project_observability
  orientation: system
- name_pattern: artisan.workflow.{workflow_id}
  kind: INTERNAL
  source_file: src/startd8/contractors/artisan_contractor.py
  attributes:
  - workflow.id
  - workflow.phase_count
  - workflow.cost_budget
  - workflow.dry_run
  category: project_observability
  orientation: system
- name_pattern: artisan.workflow.{workflow_id}.phase.{phase}
  kind: INTERNAL
  source_file: src/startd8/contractors/artisan_contractor.py
  attributes:
  - phase.name
  - phase.status
  - phase.duration_ms
  - phase.cost
  category: project_observability
  orientation: system
- name_pattern: PhaseRunner.run
  kind: INTERNAL
  source_file: src/startd8/contractors/artisan_phases/runner.py
  attributes:
  - phase.count
  - phase.total_cost
  category: project_observability
  orientation: system
- name_pattern: phase.{phase_type}.attempt.{attempt_number}
  kind: INTERNAL
  source_file: src/startd8/contractors/artisan_phases/runner.py
  attributes:
  - phase.type
  - attempt.number
  - attempt.status
  category: project_observability
  orientation: system
- name_pattern: repair.attempt
  kind: INTERNAL
  source_file: src/startd8/repair/orchestrator.py
  attributes:
  - repair.feature_name
  - repair.file_count
  - repair.route_confidence
  - repair.success
  events:
  - repair.step.{step_name}
  category: pipeline_innate
  orientation: system
