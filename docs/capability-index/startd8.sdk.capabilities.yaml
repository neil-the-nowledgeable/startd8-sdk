  - capability_id: startd8.integration.forward_manifest_draft_time_injection
    category: generate
    maturity: stable
    summary: "Inject the forward manifest as a P0 spec-prompt section at draft time, with a framework-conventions registry and review-time validation"
    audiences: [workflow_developer, integration_developer]
    description:
      developer: |
        At draft time, spec_builder.py constructs a forward-manifest section (target file_specs:
        expected elements, imports, interface contracts) and appends it to the prioritized prompt
        as a P0 section so drafters see the contract before generating. forward_manifest_extractor
        seeds default specs from a framework-conventions registry for common config files
        (next.config, tsconfig.json, prisma/schema.prisma, vite/jest/tailwind configs). At review
        time ForwardManifest.validate_implementation() checks the produced code against the
        contract and reports violations back into the lead/primary review loop.
      agent: |
        # Draft-time: forward-manifest P0 section auto-injected by implementation_engine/spec_builder.py
