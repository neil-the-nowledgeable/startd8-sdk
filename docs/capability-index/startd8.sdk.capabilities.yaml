  - capability_id: startd8.agentic.session_snapshot
    category: action
    maturity: stable
    summary: "Serialize any AgenticSession into a durable, dashboard-consumable snapshot (redacted transcript + per-session cost + stop_reason) via AgenticSession.to_snapshot — neutral agents-layer core, redactor dependency-injected"
    audiences: [workflow_developer, ai_agent]
    description:
      developer: |
        `AgenticSession.to_snapshot(*, project, session_id, generated_at, posture, pending_proposal_ids,
        stop_reason, redactor)` turns any agentic session into an `AgenticSessionSnapshot` — ordered
        turns (role, text, tool-call NAMES only — never free-text args), per-session cost (model/tokens/
        USD), `stop_reason`, and a `schema_version`. The presentation-neutral core lives in
        `agents/session_snapshot.py` (stdlib-only, NO cycle); redaction is DEPENDENCY-INJECTED via a
        `str->str` callable so the layer stays policy-free (the kickoff layer injects `fde.redaction.
        redact`; other surfaces pass their own or none). `at_a_glance()`/`cost_line()`/`tool_call_counts`
        are $0 summaries. The kickoff layer (`kickoff_experience/session_snapshot.py`) re-exports the
        core (compat) and adds on-disk persistence (`.startd8/kickoff/agentic-session.json`, temp-then-
        rename) + a Loki full-transcript emit. Promotion means ANY agentic surface (kickoff concierge,
        multi-model consultation, future Prime) gets a durable, mirror-able session for free.
      agent: |
        snap = session.to_snapshot(project="p", session_id="s", generated_at=ts, redactor=redact)
        snap.at_a_glance()   # "5 replies · survey ×2, assess ×1 · 3 proposals pending · cost ≈$0.0031 · stopped: budget"
