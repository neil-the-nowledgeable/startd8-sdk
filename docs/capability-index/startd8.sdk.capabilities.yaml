  - capability_id: startd8.util.truncation_detection
    category: validate
    maturity: stable
    summary: "Code-aware truncation detection with centralized confidence thresholds and pre-flight estimation"
    audiences: [workflow_developer, sdk_architect]
    description:
      developer: |
