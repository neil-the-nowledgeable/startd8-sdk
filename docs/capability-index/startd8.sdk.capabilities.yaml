        + _looks_like_code(). Pre-flight: estimate_output_size() estimates before generation.
        Centralized thresholds: CONFIDENCE_IS_TRUNCATED (0.5), CONFIDENCE_HIGH (0.7),
        CONFIDENCE_HIGH_PROSE (0.9), CONFIDENCE_IS_TRUNCATED_STRICT (0.3).
        Emits TRUNCATION_DETECTED, TRUNCATION_WARNING, TRUNCATION_PREFLIGHT_REJECT events.
      agent: |
