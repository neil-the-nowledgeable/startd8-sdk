  - capability_id: startd8.integration.multilang_manifest_validation
    category: validate
    maturity: stable
    summary: "Multi-language forward-manifest validation across 6 languages with per-parse confidence tiers and severity calibration"
    audiences: [workflow_developer, integration_developer]
    description:
      developer: |
        build_multilang_file_manifest(rel_path, source) dispatches by extension to per-language
        adapters and returns a FileManifest stamped with parser_tier. Python/C#/Java parse on an
        authoritative AST tier (violations → error); Go/Node/Vue parse on an advisory regex tier
        (violations → warning). map_parser_kind() maps native element kinds to the shared
        ElementKind taxonomy. Never raises: a parser that throws on a supported language degrades
        to an empty parser_tier=None manifest rather than failing the run. The manifest feeds
        ForwardManifest.validate_implementation() for cross-language element/import enforcement.
      agent: |
        from startd8.languages.manifest_adapter import build_multilang_file_manifest
        manifest = build_multilang_file_manifest(rel_path, source)  # carries .parser_tier
        # tiers: authoritative (py/cs/java → error) | advisory (go/node/vue → warning) | None
    triggers: ["manifest validation", "multilang manifest", "forward manifest", "parser tier", "element validation", "import validation"]
