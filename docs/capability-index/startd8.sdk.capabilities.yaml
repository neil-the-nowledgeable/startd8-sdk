  - capability_id: startd8.kickoff.activation
    category: observe
    maturity: stable
    summary: "Turn the kickoff oracle's readiness/attention signal into a portable exit-coded check GATE + `kickoff.activation.*` Grafana gauges + an append-only activation ledger — the SAME conditions across stack and no-stack ($0)"
    audiences: [workflow_developer, ai_agent]
    description:
      developer: |
        Tier B of the oracle-as-API roadmap. `evaluate_activation(status)` scores the
        `startd8.kickoff.status.v1` oracle payload against activation conditions — `no_inputs`,
        `blocked_fields` (severity *blocked*), `review_backlog`, `pending_proposals`,
        `readiness_below_target` — and yields an overall severity + **exit code** (`0` ok · `1`
        attention · `3` blocked, the SDK's existing convention). `startd8 kickoff check` is the
        portable GATE: CI/cron can fail on kickoff readiness WITHOUT the Grafana stack (`--json`
        emits the verdict, `--min-readiness N` sets the target, `--record` appends a ledger row).
        The SAME conditions drive two OTel gauges via the existing Meter→Mimir path —
        `kickoff.activation.open` (firing-condition count) and `kickoff.activation.severity` (0/1/2)
        — so a Grafana alert (`kickoff_activation_open > 0`) and the CLI gate never disagree.
        `ActivationLedger` appends to `.startd8/kickoff/activation-ledger.jsonl` ONLY when the oracle
        signature changes (readiness crossing, block/unblock, proposals applied, snapshot promotion)
        — a clean transition stream, not a poll log; `kickoff ledger` renders it. Pure reads over the
        oracle; the ledger is the only writer and only ever appends (never touches kickoff inputs).
      agent: |
        startd8 kickoff check                 # exit 0 ok / 1 attention / 3 blocked
        startd8 kickoff check --json --record  # machine verdict + append a ledger transition
        startd8 kickoff ledger                 # how this project got ready (transition history)
        # Grafana alert: kickoff_activation_open > 0  (or kickoff_activation_severity >= 2)
    triggers: ["kickoff check", "activation", "readiness gate", "kickoff alert", "activation ledger", "readiness alert", "kickoff ci gate", "activation surface"]
    evidence:
      - type: code
        ref: src/startd8/kickoff_experience/activation.py
        description: "evaluate_activation (conditions→severity→exit code) + ActivationLedger (append-on-change JSONL)"
      - type: code
        ref: src/startd8/kickoff_experience/metrics.py
        description: "record_activation → kickoff.activation.open/severity gauges (Meter→Mimir, best-effort no-op)"
      - type: code
        ref: src/startd8/cli_concierge.py
        description: "`kickoff check` (exit-coded gate + --record) and `kickoff ledger` commands"
      - type: test
        ref: tests/unit/kickoff_experience/test_activation.py
        description: "condition scoring, severity/exit mapping, ledger append-on-change + dedup + malformed-row tolerance"
      - type: test
        ref: tests/unit/kickoff_experience/test_check_ledger_cli.py
        description: "check exit codes + json verdict + --record→ledger round-trip"
      - type: doc
        ref: docs/design/kickoff-portal/ORACLE_API_ROADMAP.md
        description: "Tier B — activation surface (gate + gauges + ledger); invariants"
    confidence: 0.9
    dependencies:
      - startd8.kickoff.workbook_cockpit

  - capability_id: startd8.kickoff.retrospective
    category: observe
    maturity: stable
    summary: "The 'how this project got ready' story — a VIPP decision log (proposed vs accepted/rejected/countered) + a journey retrospective reconstructed from the activation ledger's transitions — from the single oracle ($0)"
    audiences: [workflow_developer, ai_agent]
    description:
      developer: |
        Tier C2/C3 of the oracle-as-API roadmap. `startd8 kickoff retrospective` (schema
        `startd8.kickoff.retrospective.v1`) combines two read-only views over data the oracle already
        folds: (C2) `decision_log(status)` reads the oracle payload's `pipeline.dispositions` (the
        persisted VIPP report) — what the concierge proposed and what was **adjudicated** (ACCEPT /
        REJECT / COUNTER + reason) — cross-referenced with the live inbox for what is still **pending**;
        (C3) `build_retrospective(status, ledger_entries)` reconstructs the journey from the Tier-B
        activation ledger's transition history as ordered **milestones** (readiness start→now, blockers
        cleared, proposals applied, snapshot promoted). The ledger IS the event stream, so no separate
        snapshot history is needed. This closes the roadmap's compounding loop: Tier-B records the
        transitions, Tier-D reads them as slope, Tier-C reads them as narrative — all one oracle, no
        new generation. `--json` for tools; degrades cleanly with no dispositions / no ledger.
      agent: |
        startd8 kickoff retrospective          # journey milestones + decision log
        startd8 kickoff retrospective --json    # startd8.kickoff.retrospective.v1 payload
    triggers: ["retrospective", "decision log", "kickoff history", "how it got ready", "proposal decisions", "kickoff journey", "postmortem", "audit trail"]
    evidence:
      - type: code
        ref: src/startd8/kickoff_experience/retrospective.py
        description: "decision_log (C2, from pipeline.dispositions + inbox) + build_retrospective (C3, milestones from the activation ledger) + kickoff_retrospective callable"
