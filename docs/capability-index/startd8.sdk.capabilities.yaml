# StartD8 SDK Core Capabilities Manifest
# Version: 1.0.0
# Created: 2026-02-12
#
# PURPOSE: Capability index for SDK-level features outside the workflow system.
# Covers agents, providers, utilities, resilience, observability, and developer tools.
#
# COMPLEMENT: startd8.workflow.capabilities.yaml (workflow-specific capabilities)
#             startd8.observability.manifest.yaml (telemetry surface)

manifest_id: startd8.sdk.capabilities
name: StartD8 SDK Core Capabilities
version: "1.19.0"
description: |
  Core capabilities of the StartD8 SDK covering multi-LLM agent management,
  provider abstraction, code utilities, resilience, rate limiting, session
  tracking, and developer tooling. These underpin the workflow system but are
  independently valuable.

owner: neilyashinsky
repository: https://github.com/neil-the-nowledgeable/startd8-sdk

labels:
  domain: llm-orchestration
  tier: sdk
  audience: developer

manifest_tokens: 400
index_tokens: 4000

# ==============================================================================
# CAPABILITIES
# ==============================================================================

capabilities:

  # ============================================================================
  # AGENT LAYER — Agent creation, configuration, and invocation
  # ============================================================================

  - capability_id: startd8.agent.system_prompt
    category: action
    maturity: stable
    summary: "Instance-level and per-call system prompt support across all 4 agent types and 5 providers"
    audiences: [workflow_developer, ai_agent]
    description:
      developer: |
        All agents (ClaudeAgent, GPT4Agent, GeminiAgent, MockAgent) accept system_prompt
        in constructor (instance default) and per-call override in agenerate()/generate().
        Per-call None preserves instance default; per-call string overrides it.
        Provider mapping: Claude → separate `system` param, OpenAI → system message,
        Gemini → system_instruction in GenerateContentConfig, Mock → stored for inspection.
      agent: |
        agent = resolve_agent_spec("anthropic:claude-sonnet-4-5-20250929", system_prompt="You are a reviewer.").
        result = await agent.agenerate("Review this code", system_prompt="Be strict.").
    triggers: ["system prompt", "system message", "instruction", "persona"]
    evidence:
      - type: code
        ref: src/startd8/agents/claude.py
        description: "ClaudeAgent system_prompt constructor + per-call override"
      - type: code
        ref: src/startd8/agents/openai.py
        description: "GPT4Agent system_prompt as system message"
      - type: code
        ref: src/startd8/agents/gemini.py
        description: "GeminiAgent system_prompt as system_instruction"
      - type: code
        ref: src/startd8/agents/mock.py
        description: "MockAgent system_prompt storage for test inspection"
      - type: test
        ref: tests/unit/test_agents.py
        description: "7 tests covering constructor default, per-call override, None preservation"
    confidence: 0.95

  - capability_id: startd8.agent.generate_result
    category: action
    maturity: stable
    summary: "GenerateResult NamedTuple replacing bare tuples from agenerate() — backward-compatible"
    audiences: [workflow_developer, sdk_architect]
    description:
      developer: |
        GenerateResult(NamedTuple) with fields: text (str), time_ms (int), token_usage (TokenUsage).
        IS a tuple subclass — existing `text, time_ms, usage = await agent.agenerate(prompt)` still
        works. Named access preferred: result.text, result.token_usage. str(result) returns .text.
        Returned by all 4 agent types. Defined in startd8.models.
      agent: |
        result = await agent.agenerate(prompt). result.text, result.time_ms, result.token_usage.
        Backward-compatible: text, t, u = result still works.
    triggers: ["generate result", "agenerate return", "named tuple"]
    evidence:
      - type: code
        ref: src/startd8/models.py
        description: "GenerateResult NamedTuple definition (lines 105-140)"
      - type: code
        ref: src/startd8/agents/base.py
        description: "BaseAgent imports and returns GenerateResult"
      - type: test
        ref: tests/unit/test_agents.py
        description: "13 tests for GenerateResult backward compatibility and named access"
    confidence: 0.95

  - capability_id: startd8.agent.resolution
    category: action
    maturity: stable
    summary: "Resolve agent spec strings to BaseAgent instances with timeout/retry config forwarding"
    audiences: [workflow_developer, ai_agent]
    description:
      developer: |
        resolve_agent_spec(spec, timeout_config=, retry_config=, **config) parses provider:model
        strings, legacy aliases, and bare model IDs. Discovers providers via ProviderRegistry,
        validates config, creates agent. timeout_config (TimeoutConfig) and retry_config (RetryConfig)
        are keyword-only params merged into **config for provider forwarding.
        resolve_agents(specs) resolves a list. All 5 providers accept **config in create_agent().
      agent: |
        agent = resolve_agent_spec("anthropic:claude-sonnet-4-5-20250929",
          timeout_config=TimeoutConfig(read=600.0), retry_config=RetryConfig(max_attempts=5)).
    triggers: ["resolve agent", "agent spec", "create agent", "timeout config", "retry config"]
    evidence:
      - type: code
        ref: src/startd8/utils/agent_resolution.py
        description: "resolve_agent_spec() with timeout/retry forwarding"
      - type: test
        ref: tests/unit/test_agent_resolution.py
        description: "16+ tests covering spec formats, timeout/retry forwarding, error cases"
    confidence: 0.9

