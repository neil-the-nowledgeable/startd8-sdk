# StartD8 Workflow Functional Requirements (Phase 3)
# Version: 1.0.0
# Created: 2026-01-29
#
# PURPOSE: Functional requirements derived from Phase 2 gap analysis.
# Organized by layer (FR-1xx protocol, FR-2xx registry, FR-3xx execution,
# FR-4xx observability, FR-5xx integration).
#
# INPUT: startd8.workflow.gap-analysis.md (Phase 2)
# OUTPUT: Requirements for Phase 4 capability design

manifest_id: startd8.workflow.functional_requirements
version: "1.0.0"

# ==============================================================================
# LAYER: PROTOCOL (FR-1xx)
# Extensions to WorkflowBase, Workflow protocol, and data models
# ==============================================================================

protocol_requirements:

  # --- Retry Policy Model ---

  - id: FR-100
    description: "Define RetryPolicy dataclass with max_retries, backoff_base, backoff_max, retryable_status_codes"
    type: protocol
    delivers_benefit: workflow.execution.retry_resilience

    acceptance_criteria:
      - "RetryPolicy dataclass with max_retries (default 3), backoff_base (default 1.0s), backoff_max (default 60s)"
      - "retryable_status_codes defaults to [429, 500, 502, 503, 504]"
      - "Includes jitter: bool = True"
      - "Importable from startd8.workflows.models"

    depends_on: []

    implementation_hints:
      layer: models
      file: src/startd8/workflows/models.py
      breaking_change: false
      affects_yaml_schema: false

    maps_to_capability: "new: startd8.workflow.execution.retry"

  - id: FR-101
    description: "Add optional retry_policy parameter to WorkflowBase.run() and WorkflowBase.arun()"
    type: protocol
    delivers_benefit: workflow.execution.retry_resilience

    acceptance_criteria:
      - "run(config, agents, on_progress, retry_policy=None) signature"
      - "arun(config, agents, on_progress, retry_policy=None) signature"
      - "None means no retry (backward compatible)"
      - "RetryPolicy passed through to _execute/_aexecute wrapper"

    depends_on: [FR-100]

    implementation_hints:
      layer: base
      file: src/startd8/workflows/base.py
      breaking_change: false
      affects_yaml_schema: false

    maps_to_capability: "new: startd8.workflow.execution.retry"

  # --- Dry Run Model ---

  - id: FR-102
    description: "Define DryRunResult with execution_plan, estimated_tokens, estimated_cost, step_order"
    type: protocol
    delivers_benefit: workflow.execution.dry_run

    acceptance_criteria:
      - "DryRunResult dataclass with execution_plan: List[Dict], estimated_cost: float"
      - "step_order lists step names with agent assignments"
      - "estimated_tokens broken down per step"
      - "to_dict() serializable"

    depends_on: []

    implementation_hints:
      layer: models
      file: src/startd8/workflows/models.py
      breaking_change: false
      affects_yaml_schema: false

    maps_to_capability: "new: startd8.workflow.execution.dry_run"

  - id: FR-103
    description: "Add optional dry_run: bool = False parameter to WorkflowBase.run()"
    type: protocol
    delivers_benefit: workflow.execution.dry_run

    acceptance_criteria:
      - "run(config, agents, on_progress, dry_run=False) signature"
      - "When dry_run=True, returns WorkflowResult with metadata['dry_run']=True"
      - "No LLM API calls made during dry run"
      - "Backward compatible (default False)"

    depends_on: [FR-102]

    implementation_hints:
      layer: base
      file: src/startd8/workflows/base.py
      breaking_change: false
      affects_yaml_schema: false

    maps_to_capability: "new: startd8.workflow.execution.dry_run"

  # --- Validation Enhancement ---

  - id: FR-110
    description: "Enhance WorkflowBase.validate_config() to validate input types against WorkflowInput.type definitions"
    type: protocol
    delivers_benefit: workflow.authoring.validation_helpers

    acceptance_criteria:
      - "Type checking: string input validated as str, number as int/float, boolean as bool"
      - "Error messages include field name, expected type, actual type"
      - "Existing required-field validation preserved"
      - "Validation extensible via _custom_validate() hook"

    depends_on: []

    implementation_hints:
      layer: base
      file: src/startd8/workflows/base.py
      breaking_change: false
      affects_yaml_schema: false

    maps_to_capability: "new: startd8.workflow.authoring.auto_validate"

  - id: FR-111
    description: "Add optional JSON Schema validation using WorkflowMetadata.get_input_schema()"
    type: protocol
    delivers_benefit: workflow.authoring.validation_helpers

    acceptance_criteria:
      - "If jsonschema package installed, validate against generated schema"
      - "Graceful fallback to type-only validation if jsonschema absent"
      - "jsonschema listed as optional dependency in pyproject.toml"
      - "Schema validation errors include JSON path to failing field"

    depends_on: [FR-110]

    implementation_hints:
      layer: base
      file: src/startd8/workflows/base.py
      breaking_change: false
      affects_yaml_schema: false
      optional_dependency: jsonschema

    maps_to_capability: "new: startd8.workflow.authoring.auto_validate"

  - id: FR-112
    description: "Add _custom_validate() hook for workflow-specific validation composable with auto-validation"
    type: protocol
    delivers_benefit: workflow.authoring.validation_helpers

    acceptance_criteria:
      - "_custom_validate(config) -> List[str] returns additional error messages"
      - "Called after auto-validation; errors merged"
      - "Default implementation returns empty list"
      - "Existing validate_config() overrides still work (backward compatible)"

    depends_on: [FR-110]

    implementation_hints:
      layer: base
      file: src/startd8/workflows/base.py
      breaking_change: false
      affects_yaml_schema: false

    maps_to_capability: "new: startd8.workflow.authoring.auto_validate"

  # --- Async Audit ---

  - id: FR-150
    description: "Audit all 9 builtin workflows and add _aexecute() where agent async calls are used"
    type: protocol
    delivers_benefit: workflow.execution.async_native

    acceptance_criteria:
      - "Each builtin workflow reviewed for async support"
      - "Workflows calling acreate_response() implement _aexecute()"
      - "WorkflowBase executor fallback still handles sync-only workflows"
      - "No behavioral changes to existing sync execution"

    depends_on: []

    implementation_hints:
      layer: builtin
      files:
        - src/startd8/workflows/builtin/doc_enhancement_workflow.py
        - src/startd8/workflows/builtin/critical_review_workflow.py
        - src/startd8/workflows/builtin/design_polish_workflow.py
        - src/startd8/workflows/builtin/policy_analysis_workflow.py
        - src/startd8/workflows/builtin/plain_language_workflow.py
        - src/startd8/workflows/builtin/lead_contractor_workflow.py
      breaking_change: false
      affects_yaml_schema: false

    maps_to_capability: "startd8.workflow.execution.async"

# ==============================================================================
# LAYER: REGISTRY (FR-2xx)
# Extensions to WorkflowRegistry and discovery
# ==============================================================================

registry_requirements:

  - id: FR-200
    description: "Add partial/substring matching to find_workflows_by_capability()"
    type: registry
    delivers_benefit: workflow.discovery.search_filter

    acceptance_criteria:
      - "find_workflows_by_capability('doc') matches 'document-enhancement'"
      - "Existing exact match still works"
      - "Case-insensitive (already implemented)"

    depends_on: []

    implementation_hints:
      layer: registry
      file: src/startd8/workflows/registry.py
      breaking_change: false
      affects_yaml_schema: false

    maps_to_capability: "startd8.workflow.discovery.search"

  - id: FR-201
    description: "Add search_workflows(query) method for text search across name and description"
    type: registry
    delivers_benefit: workflow.discovery.search_filter

    acceptance_criteria:
      - "search_workflows('document') finds workflows with 'document' in name or description"
      - "Case-insensitive"
      - "Returns List[Workflow]"

    depends_on: []

    implementation_hints:
      layer: registry
      file: src/startd8/workflows/registry.py
      breaking_change: false
      affects_yaml_schema: false

    maps_to_capability: "startd8.workflow.discovery.search"

  - id: FR-210
    description: "Add --capability filter flag to startd8 workflow list CLI command"
    type: registry
    delivers_benefit: workflow.discovery.search_filter

    acceptance_criteria:
      - "startd8 workflow list --capability code-review filters output"
      - "Uses WorkflowRegistry.find_workflows_by_capability() (partial match)"
      - "Flag is optional; omitting shows all workflows"

    depends_on: [FR-200]

    implementation_hints:
      layer: cli
      file: src/startd8/cli.py
      breaking_change: false
      affects_yaml_schema: false

    maps_to_capability: "startd8.workflow.discovery.search"

  - id: FR-211
    description: "Add --tag filter flag to startd8 workflow list CLI command"
    type: registry
    delivers_benefit: workflow.discovery.search_filter

    acceptance_criteria:
      - "startd8 workflow list --tag multi-agent filters output"
      - "Uses WorkflowRegistry.find_workflows_by_tag()"
      - "Combinable with --capability"

    depends_on: []

    implementation_hints:
      layer: cli
      file: src/startd8/cli.py
      breaking_change: false
      affects_yaml_schema: false

    maps_to_capability: "startd8.workflow.discovery.search"

  - id: FR-212
    description: "Add --search flag for text search across workflow names and descriptions"
    type: registry
    delivers_benefit: workflow.discovery.search_filter

    acceptance_criteria:
      - "startd8 workflow list --search document shows matching workflows"
      - "Uses WorkflowRegistry.search_workflows()"

    depends_on: [FR-201]

    implementation_hints:
      layer: cli
      file: src/startd8/cli.py
      breaking_change: false
      affects_yaml_schema: false

    maps_to_capability: "startd8.workflow.discovery.search"

# ==============================================================================
# LAYER: EXECUTION (FR-3xx)
# Pipeline enhancements, new step types, orchestration primitives
# ==============================================================================

execution_requirements:

  # --- Retry Resilience ---

  - id: FR-300
    description: "Add retry loop in Pipeline.arun() per step with configurable RetryPolicy"
    type: execution
    delivers_benefit: workflow.execution.retry_resilience

    acceptance_criteria:
      - "Each step retried up to max_retries on retryable errors"
      - "Exponential backoff: delay = min(base * 2^attempt, max) + jitter"
      - "Non-retryable errors (400, 401, 403) fail immediately"
      - "Pipeline accepts retry_policy parameter"

    depends_on: [FR-100, FR-101]

    implementation_hints:
      layer: pipeline
      file: src/startd8/orchestration.py
      breaking_change: false
      affects_yaml_schema: false

    maps_to_capability: "new: startd8.workflow.execution.retry"

  - id: FR-301
    description: "Classify errors as retryable vs fatal based on HTTP status and exception type"
    type: execution
    delivers_benefit: workflow.execution.retry_resilience

    acceptance_criteria:
      - "Retryable: httpx.HTTPStatusError with 429/500/502/503/504, ConnectionError, TimeoutError"
      - "Fatal: 400, 401, 403, ValidationError, ConfigurationError"
      - "Classification function: is_retryable(exception) -> bool"
      - "Configurable via RetryPolicy.retryable_status_codes"

    depends_on: [FR-100]

    implementation_hints:
      layer: pipeline
      file: src/startd8/orchestration.py
      breaking_change: false
      affects_yaml_schema: false

    maps_to_capability: "new: startd8.workflow.execution.retry"

  - id: FR-302
    description: "Checkpoint completed steps so failed workflows can resume from last successful step"
    type: execution
    delivers_benefit: workflow.execution.retry_resilience

    acceptance_criteria:
      - "Completed step indices tracked during execution"
      - "Resume parameter accepts checkpoint to skip completed steps"
      - "Checkpoint serializable for persistence (optional)"
      - "Optional feature, not required for basic retry"

    depends_on: [FR-300]

    implementation_hints:
      layer: pipeline
      file: src/startd8/orchestration.py
      breaking_change: false
      affects_yaml_schema: false

    maps_to_capability: "new: startd8.workflow.execution.checkpoint"

  # --- Pipeline Step Type Refactor ---

  - id: FR-310
    description: "Refactor Pipeline.arun() to dispatch on step type instead of assuming PipelineStep"
    type: execution
    delivers_benefit:
      - workflow.execution.conditional_routing
      - workflow.execution.parallel_agents
      - workflow.reusability.composition

    acceptance_criteria:
      - "Pipeline.arun() checks isinstance for each step type"
      - "PipelineStep: existing sequential behavior (unchanged)"
      - "ConditionalStep: evaluate predicate, run matching branch"
      - "ParallelStep: run steps concurrently via asyncio.gather"
      - "WorkflowStep: delegate to sub-workflow"
      - "Existing Pipeline tests pass unchanged"

    depends_on: []

    implementation_hints:
      layer: pipeline
      file: src/startd8/orchestration.py
      breaking_change: false
      affects_yaml_schema: false
      note: "Key refactor that unlocks three benefits simultaneously"

    maps_to_capability: "new: startd8.workflow.execution.mixed_steps"

  # --- Conditional Routing ---

  - id: FR-311
    description: "Define ConditionalStep dataclass with predicate, if_step, and else_step"
    type: execution
    delivers_benefit: workflow.execution.conditional_routing

    acceptance_criteria:
      - "ConditionalStep(name, predicate, if_step, else_step)"
      - "predicate: Callable[[str], bool] receives previous step output"
      - "if_step and else_step are PipelineStep instances"
      - "else_step is optional (skip if predicate False)"

    depends_on: []

    implementation_hints:
      layer: pipeline
      file: src/startd8/orchestration.py
      breaking_change: false
      affects_yaml_schema: false

    maps_to_capability: "new: startd8.workflow.execution.conditional"

  - id: FR-312
    description: "Add Pipeline.add_conditional(name, predicate, if_agent, else_agent) method"
    type: execution
    delivers_benefit: workflow.execution.conditional_routing

    acceptance_criteria:
      - "Returns self for chaining (like add_step)"
      - "Creates ConditionalStep internally"
      - "if_agent required, else_agent optional"
      - "Predicate receives string output from previous step"

    depends_on: [FR-311, FR-310]

    implementation_hints:
      layer: pipeline
      file: src/startd8/orchestration.py
      breaking_change: false
      affects_yaml_schema: false

    maps_to_capability: "new: startd8.workflow.execution.conditional"

  # --- Parallel Execution ---

  - id: FR-320
    description: "Define ParallelStep dataclass with list of concurrent PipelineSteps"
    type: execution
    delivers_benefit: workflow.execution.parallel_agents

    acceptance_criteria:
      - "ParallelStep(name, steps: List[PipelineStep])"
      - "Optional aggregator: Callable[[List[str]], str] to merge outputs"
      - "Optional failure_policy: 'fail_fast' | 'collect_all' (default: collect_all)"
      - "Default aggregator joins outputs with separator"

    depends_on: []

    implementation_hints:
      layer: pipeline
      file: src/startd8/orchestration.py
      breaking_change: false
      affects_yaml_schema: false

    maps_to_capability: "new: startd8.workflow.execution.parallel"

  - id: FR-321
    description: "Add Pipeline.add_parallel(name, steps, aggregator, failure_policy) method"
    type: execution
    delivers_benefit: workflow.execution.parallel_agents

    acceptance_criteria:
      - "Returns self for chaining"
      - "Creates ParallelStep internally"
      - "Steps run concurrently via asyncio.gather()"
      - "Results ordered same as input steps"

    depends_on: [FR-320, FR-310]

    implementation_hints:
      layer: pipeline
      file: src/startd8/orchestration.py
      breaking_change: false
      affects_yaml_schema: false

    maps_to_capability: "new: startd8.workflow.execution.parallel"

  - id: FR-322
    description: "Handle partial failures in parallel execution based on failure_policy"
    type: execution
    delivers_benefit: workflow.execution.parallel_agents

    acceptance_criteria:
      - "fail_fast: cancel remaining on first failure, raise immediately"
      - "collect_all: run all steps, return mixed success/failure results"
      - "Failed parallel steps recorded in StepResult with error"
      - "ParallelStep overall success = all sub-steps succeeded"

    depends_on: [FR-320]

    implementation_hints:
      layer: pipeline
      file: src/startd8/orchestration.py
      breaking_change: false
      affects_yaml_schema: false

    maps_to_capability: "new: startd8.workflow.execution.parallel"

  # --- Workflow Composition ---

  - id: FR-330
    description: "Define WorkflowStep that wraps a Workflow instance as a Pipeline step"
    type: execution
    delivers_benefit: workflow.reusability.composition

    acceptance_criteria:
      - "WorkflowStep(name, workflow, config_mapping)"
      - "config_mapping: Callable[[str], Dict[str, Any]] transforms previous output to sub-workflow config"
      - "Executes workflow.run(mapped_config, agents)"
      - "Extracts WorkflowResult.output as step output for next step"

    depends_on: []

    implementation_hints:
      layer: pipeline
      file: src/startd8/orchestration.py
      breaking_change: false
      affects_yaml_schema: false

    maps_to_capability: "new: startd8.workflow.reusability.compose"

  - id: FR-331
    description: "Add Pipeline.add_workflow(name, workflow, config_mapping) method"
    type: execution
    delivers_benefit: workflow.reusability.composition

    acceptance_criteria:
      - "Returns self for chaining"
      - "Creates WorkflowStep internally"
      - "Sub-workflow validated before execution"
      - "Sub-workflow agents resolved from parent pipeline context"

    depends_on: [FR-330, FR-310]

    implementation_hints:
      layer: pipeline
      file: src/startd8/orchestration.py
      breaking_change: false
      affects_yaml_schema: false

    maps_to_capability: "new: startd8.workflow.reusability.compose"

  - id: FR-332
    description: "Aggregate sub-workflow metrics and step results into parent workflow"
    type: execution
    delivers_benefit: workflow.reusability.composition

    acceptance_criteria:
      - "Sub-workflow tokens/cost added to parent WorkflowMetrics"
      - "Sub-workflow StepResults flattened into parent with namespace prefix (e.g., 'sub:step1')"
      - "Sub-workflow progress nested under parent progress callback"
      - "Parent duration includes sub-workflow duration"

    depends_on: [FR-330]

    implementation_hints:
      layer: pipeline
      file: src/startd8/orchestration.py
      breaking_change: false
      affects_yaml_schema: false

    maps_to_capability: "new: startd8.workflow.reusability.compose"

  # --- Dry Run ---

  - id: FR-340
    description: "Implement dry_run interception in WorkflowBase.run() before _execute()"
    type: execution
    delivers_benefit: workflow.execution.dry_run

    acceptance_criteria:
      - "When dry_run=True, build execution plan without calling _execute()"
      - "Plan includes: step count, step names, agent assignments"
      - "Returns WorkflowResult with output=DryRunResult and metadata['dry_run']=True"
      - "No LLM API calls made"

    depends_on: [FR-102, FR-103]

    implementation_hints:
      layer: base
      file: src/startd8/workflows/base.py
      breaking_change: false
      affects_yaml_schema: false

    maps_to_capability: "new: startd8.workflow.execution.dry_run"

  - id: FR-341
    description: "Estimate token usage and cost per step from input size and model pricing"
    type: execution
    delivers_benefit: workflow.execution.dry_run

    acceptance_criteria:
      - "Estimate input tokens from character count / 4 heuristic"
      - "Estimate output tokens from model-specific multiplier"
      - "Lookup cost via PricingService"
      - "Return per-step and total estimated cost"

    depends_on: [FR-340]

    implementation_hints:
      layer: base
      file: src/startd8/workflows/base.py
      breaking_change: false
      affects_yaml_schema: false
      note: "PricingService already exists in costs/pricing.py"

    maps_to_capability: "new: startd8.workflow.execution.dry_run"

# ==============================================================================
# LAYER: OBSERVABILITY (FR-4xx)
# OTel spans, events, metrics, visualization
# ==============================================================================

observability_requirements:

  # --- OpenTelemetry Integration ---

  - id: FR-400
    description: "Create parent OTel span for each workflow execution in WorkflowBase.run()"
    type: observability
    delivers_benefit: workflow.observability.otel_integration

    acceptance_criteria:
      - "Span name: workflow.{workflow_id}"
      - "Span attributes: workflow.id, workflow.name, workflow.version"
      - "Span starts before _execute(), ends after completion"
      - "Error recorded on span if workflow fails"
      - "No-op when opentelemetry not installed"

    depends_on: []

    implementation_hints:
      layer: base
      file: src/startd8/workflows/base.py
      breaking_change: false
      affects_yaml_schema: false
      optional_dependency: opentelemetry-api

    maps_to_capability: "new: startd8.workflow.observability.otel"

  - id: FR-401
    description: "Create child OTel span for each workflow step"
    type: observability
    delivers_benefit: workflow.observability.otel_integration

    acceptance_criteria:
      - "Span name: workflow.{workflow_id}.step.{step_name}"
      - "Attributes: step.name, agent.name, agent.model"
      - "Span events for step start and completion"
      - "Token and cost metrics as span attributes on completion"

    depends_on: [FR-400]

    implementation_hints:
      layer: pipeline
      file: src/startd8/orchestration.py
      breaking_change: false
      affects_yaml_schema: false

    maps_to_capability: "new: startd8.workflow.observability.otel"

  - id: FR-402
    description: "Attach ProjectContext labels to root workflow span"
    type: observability
    delivers_benefit: workflow.observability.otel_integration

    acceptance_criteria:
      - "If ProjectContext non-empty, add as span attributes"
      - "Attribute names follow semantic conventions: io.contextcore.project.id, etc."
      - "Enables Grafana filtering by project/task/sprint"

    depends_on: [FR-400]

    implementation_hints:
      layer: base
      file: src/startd8/workflows/base.py
      breaking_change: false
      affects_yaml_schema: false

    maps_to_capability: "new: startd8.workflow.observability.otel"

  - id: FR-403
    description: "Graceful no-op when OpenTelemetry packages not installed"
    type: observability
    delivers_benefit: workflow.observability.otel_integration

    acceptance_criteria:
      - "try/except ImportError for opentelemetry imports"
      - "No-op tracer when OTel absent (no spans created, no errors)"
      - "Zero performance overhead when OTel not installed"
      - "opentelemetry-api listed as optional dependency: pip install startd8[otel]"

    depends_on: []

    implementation_hints:
      layer: base
      file: src/startd8/workflows/base.py
      breaking_change: false
      affects_yaml_schema: false

    maps_to_capability: "new: startd8.workflow.observability.otel"

  # --- Retry Observability ---

  - id: FR-410
    description: "Emit PIPELINE_STEP_RETRY EventBus event on each retry attempt"
    type: observability
    delivers_benefit: workflow.execution.retry_resilience

    acceptance_criteria:
      - "New EventType.PIPELINE_STEP_RETRY in events/types.py"
      - "Event data includes: step_name, attempt_number, error, delay_seconds"
      - "Emitted before backoff sleep"

    depends_on: [FR-300]

    implementation_hints:
      layer: events
      file: src/startd8/events/types.py
      breaking_change: false
      affects_yaml_schema: false

    maps_to_capability: "new: startd8.workflow.execution.retry"

  - id: FR-411
    description: "Add retry_count to StepResult.metadata and total_retries to WorkflowMetrics"
    type: observability
    delivers_benefit: workflow.execution.retry_resilience

    acceptance_criteria:
      - "StepResult.metadata['retry_count'] set after step execution"
      - "WorkflowMetrics gains total_retries: int = 0 field"
      - "Existing serialization (to_dict) includes new fields"

    depends_on: [FR-300]

    implementation_hints:
      layer: models
      file: src/startd8/workflows/models.py
      breaking_change: false
      affects_yaml_schema: false

    maps_to_capability: "new: startd8.workflow.execution.retry"

  # --- Visualization ---

  - id: FR-420
    description: "Create WorkflowVisualizer that exports Pipeline structure as Mermaid diagram"
    type: observability
    delivers_benefit: workflow.observability.visualization

    acceptance_criteria:
      - "WorkflowVisualizer.to_mermaid(pipeline) returns Mermaid markdown string"
      - "Sequential steps shown as linear flow"
      - "ConditionalSteps shown as diamond decision nodes"
      - "ParallelSteps shown as fork/join"
      - "WorkflowSteps shown as sub-graph"

    depends_on: []

    implementation_hints:
      layer: new_module
