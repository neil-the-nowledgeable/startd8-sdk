# Demo Registry — pointers to rich, domain-specific demo datasets that live OUTSIDE this repo.
#
# Policy (see README.md): the SDK carries NO demo domain in product code, and only neutral,
# self-contained fixtures in tests/. Rich demos (real personas, kickoff inputs, captured sessions)
# live in their own repos and are REFERENCED here — never copied in, never a runtime/CI dependency.
#
# Schema (per record):
#   id            stable kebab-case identifier
#   title         human name
#   lives_in      path to the demo's home (repo-relative to this SDK checkout's parent, or a URL)
#   use_for       what this demo is good for exercising
#   kickoff_inputs (optional) where the demo's kickoff inputs live, relative to lives_in
#   notes         (optional) caveats / provenance
version: 1
demos:
  - id: retail-blue-planet
    title: ContextCore retail demo ("Blue Planet Adventures")
    lives_in: ../contextcore-demo-retail
    use_for: >-
      A rich, multi-persona retail scenario for exercising the stakeholder/kickoff panel against a
      dataset denser than a bare app. This is the ORIGIN of the "Blue Planet Adventures" data; it was
      previously copied ad hoc into the SDK (facilitation defaults + test fixtures) and has been
      removed from the SDK — reference it here instead of copying it back in.
    kickoff_inputs: docs/kickoff/inputs
    notes: >-
      Separate, legitimate project — do not delete. Also mirrored under
      ../ContextCore-wt/*/docs/demo-artifacts/{blue-planet-adventures,retail-demo}/.

  - id: benchmark-portal
    title: Summer 2026 Benchmark Reviewer Portal
    lives_in: ../benchmarking/Summer2026-portal-rebuild/portal/internal
    use_for: >-
      A real, non-retail all-Python app (FastAPI + HTMX) generated by the deterministic cascade —
      the honest neutral domain for panel/kickoff demos and the model for the in-repo neutral test
      fixture (tests/fixtures/kickoff_panel/complete_generic.json).
    kickoff_inputs: docs/kickoff/inputs
