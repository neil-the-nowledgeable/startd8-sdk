title: Agentic Loop Observability
uid: cc-agentic-loop-observability
tags:
- agentic-loop
- observability
- tempo
- cc
variables:
- type: tempoDatasource
  name: tempo
  label: Trace Source
  hide: 0
panels:
- type: traceqlStat
  title: Runs (total)
  description: Total agentic runs over the range.
  targets:
  - expr: '{ name = "agentic.session" } | count_over_time()'
    refId: A
  unit: short
  thresholds:
  - value: 0.0
    color: blue
- type: traceqlGauge
  title: Success rate (completed)
  description: Share of runs that reached the `completed` stop_reason.
  targets:
  - expr: '{ name = "agentic.session" && span.agentic.stop_reason = "completed" }
      | count_over_time()'
    refId: A
  unit: percentunit
  fieldConfig:
    defaults:
      min: 0.0
      max: 1.0
  thresholds:
  - value: 0.0
    color: red
- type: traceqlTimeseries
  title: Outcome breakdown (count by stop_reason)
  targets:
  - expr: '{ name = "agentic.session" } | count_over_time() by (span.agentic.stop_reason)'
    refId: A
    legendFormat: '`{{span.agentic.stop_reason}}`'
  unit: short
- type: traceqlTimeseries
  title: Runs over time (by outcome)
  targets:
  - expr: '{ name = "agentic.session" } | rate() by (span.agentic.stop_reason)'
    refId: A
    legendFormat: '`{{span.agentic.stop_reason}}`'
  unit: short
- type: traceqlStat
  title: Total cost (USD)
  targets:
  - expr: '{ name = "agentic.session" } | sum_over_time(span.agentic.total_cost_usd)'
    refId: A
  unit: currencyUSD
  thresholds:
  - value: 0.0
    color: blue
- type: traceqlTimeseries
  title: Cost over time (by model)
  targets:
  - expr: '{ name = "agentic.session" } | sum_over_time(span.agentic.total_cost_usd)
      by (span.gen_ai.request.model)'
    refId: A
    legendFormat: '`{{span.gen_ai.request.model}}`'
  unit: currencyUSD
- type: traceqlTimeseries
  title: Tokens in / out
  targets:
  - expr: '{ name = "agentic.session" } | sum_over_time(span.gen_ai.usage.input_tokens)'
    refId: A
    legendFormat: '`input`'
  - expr: '{ name = "agentic.session" } | sum_over_time(span.gen_ai.usage.output_tokens)'
    refId: B
    legendFormat: '`output`'
  unit: short
- type: traceqlTimeseries
  title: Turns per run (p50 / p95)
  targets:
  - expr: '{ name = "agentic.session" } | quantile_over_time(span.agentic.turns, 0.5)'
    refId: A
    legendFormat: '`p50`'
  - expr: '{ name = "agentic.session" } | quantile_over_time(span.agentic.turns, 0.95)'
    refId: B
    legendFormat: '`p95`'
  unit: short
- type: traceqlTimeseries
  title: Tool calls (rate + failures)
  targets:
  - expr: '{ name = "agentic.tool_call" } | rate()'
    refId: A
    legendFormat: '`tool calls`'
  - expr: '{ name = "agentic.tool_call" && span.agentic.tool_ok = false } | rate()'
    refId: B
    legendFormat: '`failures`'
  unit: short
- type: traceqlTimeseries
  title: Compaction events (overflow recovery)
  targets:
  - expr: '{ name = "agentic.compaction" } | rate()'
    refId: A
    legendFormat: '`compactions`'
  unit: short
- type: traceqlTimeseries
  title: Safety-bound stops (budget / repeated / overflow)
  targets:
  - expr: '{ name = "agentic.session" && span.agentic.stop_reason =~ "budget|repeated_calls|context_overflow"
      } | rate() by (span.agentic.stop_reason)'
    refId: A
    legendFormat: '`{{span.agentic.stop_reason}}`'
  unit: short
