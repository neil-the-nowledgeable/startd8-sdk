# Generated by startd8 observability artifact generator
# Service: checkout-api (transport: grpc)
# Derivation:
#   alert_severity: manifest.spec.business.criticality (high → critical) [manifest]
#   latency_p99: manifest.spec.requirements.latency_p99 (500ms) [manifest]
#   availability: manifest.spec.requirements.availability (99.9) [manifest]

groups:
- name: checkout-api.slo
  rules:
  - alert: CheckoutApiLatencyP99High
    expr: "histogram_quantile(0.99,\n  rate(rpc_server_duration_bucket{service=\"\
      checkout-api\"}[5m])\n) > 0.5"
    for: 5m
    labels:
      severity: critical
      service: checkout-api
      protocol: grpc
    annotations:
      summary: checkout-api p99 latency exceeds 500ms
      source: Derived from manifest.spec.requirements.latencyP99
      dashboard_url: /d/obs-checkout-api
  - alert: CheckoutApiErrorRateHigh
    expr: "(\n  rate(rpc_server_duration_count{service=\"checkout-api\",grpc_code=~\"\
      Unavailable|Internal|Unimplemented|DataLoss\"}[5m])\n  / rate(rpc_server_duration_count{service=\"\
      checkout-api\"}[5m])\n) > 0.001"
    for: 5m
    labels:
      severity: critical
      service: checkout-api
      protocol: grpc
    annotations:
      summary: checkout-api error rate exceeds 0.1%
      source: Derived from manifest.spec.requirements.availability
      dashboard_url: /d/obs-checkout-api
  - alert: CheckoutApiAvailabilityLow
    expr: "(\n  1 - rate(rpc_server_duration_count{service=\"checkout-api\",grpc_code=~\"\
      Unavailable|Internal|Unimplemented|DataLoss\"}[5m])\n    / rate(rpc_server_duration_count{service=\"\
      checkout-api\"}[5m])\n) < 0.999"
    for: 5m
    labels:
      severity: critical
      service: checkout-api
      protocol: grpc
    annotations:
      summary: checkout-api availability below 99.9%
      source: Derived from manifest.spec.requirements.availability
      dashboard_url: /d/obs-checkout-api
