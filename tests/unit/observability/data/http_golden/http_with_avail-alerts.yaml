# Generated by startd8 observability artifact generator
# Service: http-with-avail (transport: http)
# Derivation:
#   alert_severity: manifest.spec.business.criticality (high → critical) [manifest]
#   latency_p99: manifest.spec.requirements.latency_p99 (500ms) [manifest]
#   availability: manifest.spec.requirements.availability (99.9) [manifest]

groups:
- name: http-with-avail.slo
  rules:
  - alert: HttpWithAvailLatencyP99High
    expr: "histogram_quantile(0.99,\n  rate(http_server_duration_bucket{service=\"\
      http-with-avail\"}[5m])\n) > 0.5"
    for: 5m
    labels:
      severity: critical
      service: http-with-avail
      protocol: http
    annotations:
      summary: http-with-avail p99 latency exceeds 500ms
      source: Derived from manifest.spec.requirements.latencyP99
      dashboard_url: /d/obs-http-with-avail
  - alert: HttpWithAvailErrorRateHigh
    expr: "(\n  rate(http_server_duration_count{service=\"http-with-avail\",status=~\"\
      5..\"}[5m])\n  / rate(http_server_duration_count{service=\"http-with-avail\"\
      }[5m])\n) > 0.001"
    for: 5m
    labels:
      severity: critical
      service: http-with-avail
      protocol: http
    annotations:
      summary: http-with-avail error rate exceeds 0.1%
      source: Derived from manifest.spec.requirements.availability
      dashboard_url: /d/obs-http-with-avail
  - alert: HttpWithAvailAvailabilityLow
    expr: "(\n  1 - rate(http_server_duration_count{service=\"http-with-avail\",status=~\"\
      5..\"}[5m])\n    / rate(http_server_duration_count{service=\"http-with-avail\"\
      }[5m])\n) < 0.999"
    for: 5m
    labels:
      severity: critical
      service: http-with-avail
      protocol: http
    annotations:
      summary: http-with-avail availability below 99.9%
      source: Derived from manifest.spec.requirements.availability
      dashboard_url: /d/obs-http-with-avail
