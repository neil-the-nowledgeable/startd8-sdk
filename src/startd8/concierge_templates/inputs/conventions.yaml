# <Project> — Kickoff inputs: TECHNOLOGY CONVENTIONS                           [TEMPLATE]
# The stack and structure all generated code must follow. See ../KICKOFF_INPUTS_EXPLAINED.md §3.
# This sheet exists so generation FOLLOWS conventions instead of INVENTING them (the run-028
# failure class). PRODUCTION posture: this file is generated by plan ingestion from the
# project's plan/requirements, then validated by the Architect (provenance flips to `authored`
# on validation). Hand-author only when the team is the architect.
# Must agree with build-preferences.yaml `language`.

domain: conventions
provenance_default: <authored | templated>   # authored once architect-validated

language: <python | …>
stack:
  framework: <fastapi | …>           # name the choice AND what it is not, if there's a common confusion
  data_layer: <sqlmodel | …>
  templates: <jinja2 | …>
  frontend: <htmx | …>
  database: <sqlite | …>

module_paths:                        # the invention-prone ones — be explicit
  tables: <app.tables>
  routers: <app.routers>
  pages: <app.pages>
  templates_dir: <app/templates>

naming:
  route_style: <kebab-case>
  files: <snake_case>
  classes: <PascalCase>

field_authorship: <path/to/human_inputs.yaml>   # fields AI must never write

architecture_notes:
  - "<contract-first / monolith-vs-services / determinism-preference — the 2-3 sentences a new generator tier must know>"
