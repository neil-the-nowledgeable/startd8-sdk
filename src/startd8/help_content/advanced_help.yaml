        keys: ["Mouse select", "Cmd+C / Ctrl+C"]
        context: "Terminal output"

      - action: "Paste from clipboard"
        keys: ["Cmd+V / Ctrl+V"]
        context: "Text input fields"

      - action: "Move cursor to start"
        keys: ["Ctrl+A"]
        context: "Text input"

      - action: "Move cursor to end"
        keys: ["Ctrl+E"]
        context: "Text input"

# ═══════════════════════════════════════════════════════════════════════════
# TROUBLESHOOTING GUIDE
# ═══════════════════════════════════════════════════════════════════════════

troubleshooting:
  api_issues:
    title: "API Key / Authentication Issues"
    icon: "🔑"
    problems:
      - issue: "Invalid API key error"
        solutions:
          - "Check key is copied correctly (no extra spaces/newlines)"
          - "Verify you have the right key (Claude key vs OpenAI key)"
          - "Confirm key hasn't been revoked or expired"
          - "Try regenerating a new key on the provider's website"
          - "Use Main menu → 🔑 Manage API Keys to verify"

      - issue: "No API key found"
        solutions:
          - "Go to Main menu → 🔑 Manage API Keys"
          - "Add the key for the agent you want to use"
          - "Check environment variables (they override stored keys)"
          - "Verify API_KEY_ENV variable is set correctly"

      - issue: "API key rejected"
        solutions:
          - "API key might be invalid or expired"
          - "Check API service status page"
          - "Regenerate a fresh key"
          - "Check you're using right service (not mixing Claude and OpenAI keys)"

  agent_issues:
    title: "Agent Connection Problems"
    icon: "🤖"
    problems:
      - issue: "Agent not available"
        solutions:
          - "Check if API key is set for that agent"
          - "Test agent connection: Main menu → 🔬 Test Agent Connections"
          - "Check internet connection"
          - "Verify API service is up (check their status page)"

      - issue: "Agent timeout / slow response"
        solutions:
          - "API services can be slow during peak hours"
          - "Try a different agent"
          - "Simplify your prompt"
          - "Check network connection"
          - "Try again in a few moments"

      - issue: "Model not available / outdated"
        solutions:
          - "Check model name is correct (e.g., claude-3-5-sonnet)"
          - "API providers retire old models"
          - "Create new agent with current model name"
          - "Check API provider's documentation for available models"

  file_issues:
    title: "File or Storage Issues"
    icon: "📁"
    problems:
      - issue: "File not found"
        solutions:
          - "Check file path is correct (absolute or relative)"
          - "Verify file exists in that location"
          - "Check file isn't in ignored directories"
          - "Try using absolute path instead of relative"
          - "Check file permissions (must be readable)"

      - issue: "Permission denied"
        solutions:
          - "Check you have read/write permission for the file/folder"
          - "Try selecting a different directory"
          - "Check output folder settings"
          - "Run TUI from a directory you have access to"

      - issue: "Encoding error with file"
        solutions:
          - "Files must be UTF-8 encoded"
          - "Convert file to UTF-8 in your editor"
          - "Try resaving the file"
          - "Use plain text editors (not Word docs)"

  workflow_issues:
    title: "Workflow Not Working"
    icon: "🔄"
    problems:
      - issue: "Workflow stuck or hanging"
        solutions:
          - "Press Ctrl+C to cancel"
          - "Test with Mock agent first"
          - "Check internet connection"
          - "Try smaller/simpler task"
          - "Restart the TUI"

      - issue: "Unexpected results from workflow"
        solutions:
          - "Refine your prompt to be more specific"
          - "Try different agent (Claude vs GPT-4)"
          - "Include more context in your prompt"
          - "Try a simpler task first"

      - issue: "Cannot save workflow results"
        solutions:
          - "Check output folder permissions"
          - "Verify output folder exists"
          - "Check disk space available"
          - "Try enabling/disabling output folders: Main menu → 📁"

  performance_issues:
    title: "Performance / Speed Issues"
    icon: "⚡"
    problems:
      - issue: "TUI is slow"
        solutions:
          - "Wait for current operation to complete"
          - "Use faster agents (GPT-3.5 instead of GPT-4)"
          - "Try with Mock agents (instant response)"
          - "Close other applications to free memory"
          - "Check system CPU/memory usage"

      - issue: "Workflow takes too long"
        solutions:
          - "Use faster model (cost trade-off)"
          - "Simplify your prompt"
          - "Use Mock agent for testing first"
          - "Check if agent is actually processing (not stuck)"

  other_issues:
    title: "Other Issues"
    icon: "❓"
    problems:
      - issue: "Cannot create agent"
        solutions:
          - "Check agent name doesn't already exist"
          - "Verify model name is correct"
          - "Ensure you have required permissions"
          - "Try simpler name (no special characters)"

      - issue: "Settings not saving"
        solutions:
          - "Check write permissions in .startd8 folder"
          - "Verify disk space is available"
          - "Settings save to ~/.startd8/ directory"
          - "Try restarting the TUI"

      - issue: "Terminal display issues"
        solutions:
          - "Try resizing terminal window"
          - "Ensure terminal supports color output"
          - "Try different terminal (iTerm, alacritty, etc.)"
          - "Check terminal font supports emoji"

