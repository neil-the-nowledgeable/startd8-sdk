# Descriptive layer — the "meta layer" over `startd8 wireframe` (FR-DL-*).
#
# ONE authored record per wireframe SECTION KEY (keyed on the stable `WireframeSection.key`,
# NOT its display title — [[concept-key-not-presentation-name]]). Each carries three terse,
# authored clauses:
#   what — one clause: what this section shows.
#   why  — why it matters to the ARCHITECT at the DATA MODEL bookend (the cheapest correction
#          point; a wrong contract is the most expensive thing to fix).
#   do   — what to check / approve before letting the $0 cascade build it.
#   next — one clause: the drill affordance — where to look next (FR-DL-3, M-DL2).
#
# This file is the SINGLE SOURCE of the wireframe's section narration (FR-DL-5): the renderer
# holds no narration strings; it reads them from here. Deterministic, authored, NO LLM (FR-DL-8,
# Hitsuzen). Placeholders `{{count}}` (len(section.items)) / `{{status}}` (section.status) are
# filled from the live section by describe.py; an unfillable placeholder is a typed error (CCbC),
# never silent blank text.
#
# Grounded to what each section's builder in plan.py actually emits (read the builders before
# editing — the what/do must be factual, not aspirational).
#
# Spec: startd8-sdk/docs/design/descriptive-layer/DESCRIPTIVE_LAYER_REQUIREMENTS.md
#       (FR-DL-1 record schema · FR-DL-5 single-sourced fill · FR-DL-7 consistent grammar ·
#        FR-DL-8 deterministic/no-LLM). Scope: what/why/do/next per section + the aggregate
#        `summary` record (FR-DL-12); no audience variants, no 3-axis facets yet (M-DL3/FR-DL-11 deferred).

records:

  scaffold:
    what: "The container shell the cascade builds: pyproject, package, persistence, run.sh, and (optionally) Dockerfile + alembic migrations."
    why: "This is the frame every other artifact lands in — its Python version, package name, and DB path are decided here and fixed for the whole app."
    do: "Confirm the package name, Python version, and SQLite path are right; check whether the container + migrations toggles match how you'll ship."
    next: "→ then the data model (Entities) — the contract that fills this shell."
    audience:
      end_user:
        title: "The basics"
        what: "The basic shell your app lives in — the plumbing that makes everything run."
        wont: "This isn't anything you'll see or click — it's behind-the-scenes groundwork, not a feature."
        need: "Nothing from you here — it's already handled for you."
        do: "Nothing to decide; this is just confirmation the foundation is in place."
        next: "→ next, the real heart of your app: the things it keeps track of."
        fluency:
          beginner:
            what: "The basic behind-the-scenes setup your app sits on — like the foundations and wiring of a house before any rooms go in. You won't see it directly, but everything else depends on it being here."
            wont: "This isn't a feature anyone will click or look at — it's the groundwork that lets the visible parts work. There's nothing here for you to design."
            need: "Nothing is needed from you here — this part is set up automatically. You can read straight past it."
          advanced:
            what: "The behind-the-scenes shell everything runs on."
            wont: "Nothing visible; no feature to design here."
            need: "Nothing needed — handled for you."

  deployment:
    what: "The declared deployment mode ({{status}}) and its per-dimension posture: persistence, bind address, schema-init, secrets, observability, and identity."
    why: "Installed-vs-deployed flips loopback→public, SQLite→pooled, create_all→migrations, and no-auth→auth-seam — one switch that reshapes runtime posture and any FR-CFG-5 coherence findings."
    do: "Confirm the mode is the one you intend to ship; scan for any coherence:* findings — an incoherent config makes `generate backend` refuse the build."
    next: "→ then Services, the layer this mode runs."
    audience:
      end_user:
        title: "Where it runs"
        what: "Where your app lives and how people reach it — on your own computer to try it out, or online for others to use."
        wont: "This doesn't change what the app does — only where it runs and who can get to it."
        need: "Decide whether this is just for you to try, or ready for other people to use."
        do: "Confirm this matches how you plan to share the app."
        next: "→ next, the parts the computer handles for you."
        fluency:
          beginner:
            what: "Where your app actually lives and how people get to it — either just on your own computer so you can try it privately, or put online so others can use it from anywhere. It's the difference between a private draft and something you've shared."
            wont: "Choosing this doesn't change anything the app does or how it looks — only where it runs and who is able to reach it."
            need: "Decide, for now, whether this is just for you to test on your own, or whether it should be ready for other people to use. You can always change your mind later."
          advanced:
            what: "Where it runs — your own computer, or online for others."
            wont: "Doesn't change what the app does, only who can reach it."
            need: "Decide: private trial, or ready for others."

  services:
    what: "The always-on service layer: the FastAPI JSON-CRUD app, HTMX web mount, export endpoints, OpenAPI contract, and any declared AI passes and their read/write entity edges."
    why: "This is the running backend the contract projects into — the AI passes and their source-bound / human-owned boundaries are where the app's edge behavior lives."
    do: "Confirm the AI passes read and write the entities you expect, and that the AI boundary (human-owned fields the AI never writes) is drawn where you want it."
    next: "→ drill the AI passes' entities, or Entities for the full model."
    audience:
      end_user:
        title: "AI Assisted Writing"
        what: "The clever parts the computer handles automatically — like writing first drafts or summaries."
        wont: "The computer won't invent facts or make decisions for you — it only drafts from what's already there."
        need: "Decide which automatic helpers you're comfortable turning on."
        do: "Check the automatic parts are things you're happy letting the computer do on your behalf."
        next: "→ see exactly which details the computer writes and which stay yours."
        fluency:
          beginner:
            what: "The parts where the computer helps out on its own — for example drafting a first version of some text, or writing a short summary of something you already entered. Think of it as a helpful assistant that does the first pass so you're never starting from a blank page."
            wont: "The computer won't make things up or make choices for you. It only works from information that's already there — so it drafts and summarises, it doesn't decide."
            need: "Decide which of these automatic helpers you'd like switched on, and which you'd rather do yourself. You stay in control of how much help it gives."
          advanced:
            what: "Where the computer drafts or summarises for you, automatically."
            wont: "It won't invent facts or decide — only draft from what's already there."
            need: "Pick which automatic helpers to turn on."

  entities:
    what: "The contract models the schema declares ({{count}} rows: the entity summary plus the relation graph, orphan check, and one row per entity's CRUD)."
    why: "The entity set IS the data model — the DATA MODEL bookend you're here to approve. Foreign-key connectivity and stranded (orphan) entities are the shape signals that are cheapest to fix now."
    do: "Confirm the entity list is complete and correctly named; check the relation graph reads right and that no entity is stranded (orphan) unless you meant it to be raw-CRUD only."
    next: "→ drill any entity to its schema.prisma model; then Views, which surface them."
    audience:
      end_user:
        title: "What it tracks"
        what: "The kinds of things your app remembers — like people, jobs, and companies. This is the heart of your app."
        wont: "It won't remember anything that isn't on this list — a missing kind of thing simply won't exist in the app."
        need: "Confirm the list is complete and named the way you'd say it out loud."
        do: "Read it aloud — is everything here you'll want to look up later? Anything missing?"
        next: "→ open any one to see the details it keeps about it."
        fluency:
          beginner:
            what: "The kinds of things your app remembers — for example the people it tracks, the jobs they've applied to, and the companies involved. Think of it like a set of filing cabinets, one drawer per kind of thing. This is the heart of your app."
            wont: "Your app can only remember the kinds of things on this list. If a kind of thing you care about isn't here, the app has nowhere to keep it — so it simply won't exist in the app at all."
            need: "Read the list slowly and picture using the app day to day. Is every kind of thing you'll want to look up later here? Is anything named in a way that might confuse someone else on your team?"
          advanced:
            what: "The core record types your app stores."
            wont: "Only these types exist; unlisted ones won't."
            need: "Confirm the list is complete and clearly named."

  pages:
    what: "The navigation the cascade always ships (top nav + home/index + live-toggle admin, auto-derived from the schema) plus any custom content pages declared in pages.yaml."
    why: "Nav ships whether or not you author pages.yaml — so this tells you what the app's front door looks like by default, and which custom pages sit on top of it."
    do: "Confirm the default nav is acceptable; check any custom pages point at real content files (their bodies are scored in the Content section)."
    next: "→ Content, for which page bodies are authored."
    audience:
      end_user:
        title: "Screens & menus"
        what: "The screens people land on when they open your app — the front door and the menu that gets them around."
        wont: "Only these screens will exist — a page you pictured but don't see here won't be built unless you ask for it."
        need: "Picture your ideal first screen; note any screen you expected that isn't here."
        do: "Imagine opening the app fresh — is the starting screen and the menu what you'd expect to see?"
        next: "→ see which screens still need their words written."
        fluency:
          beginner:
            what: "The screens people see when they open your app, and the menu that helps them move around — like the front door of a shop and the signs that point to each aisle. This is what someone meets first."
            wont: "Only the screens shown here will be built. If you had a particular screen in mind and it isn't listed, it won't appear unless you ask for it — so it's worth checking now."
            need: "Picture opening the app for the very first time. What screen would you want to land on? Make a note of any screen you expected that isn't here."
          advanced:
            what: "The screens people land on, plus the menu between them."
            wont: "Only these screens exist; an unlisted one won't be built."
            need: "Note any screen you expected that's missing."

  forms:
    what: "The create/edit form the cascade renders per entity ({{count}} rows), with each form's shown fields and the fields it omits (server-managed and human-owned)."
    why: "The form is the human write-surface — which fields a user can set, and which are withheld (server-managed or AI/human-owned), is a data-integrity decision made here."
    do: "Confirm each form shows the fields a user should set and omits the ones they shouldn't; check the per-form help coverage if you author form_prose."
    next: "→ Services' AI boundary, for which fields the AI writes vs the human."
    audience:
      end_user:
        title: "Forms"
        what: "The forms people fill in to add or change information — and exactly which boxes they'll see on each one."
        wont: "Boxes not listed here won't appear — no one can enter something the form doesn't ask for."
        need: "Check every box you'd want is there (a phone number? a date?) — and that nothing private is exposed."
        do: "Go form by form and picture filling it in yourself — is anything you'd want to enter missing?"
        next: "→ some boxes are filled in for you automatically; those are shown as 'managed for you'."
        fluency:
          beginner:
            what: "The forms people fill in to add or change information — like a paper form with boxes to complete. For each one, you'll see exactly which boxes appear, so you can spot anything missing before it's built."
            wont: "The form can only show the boxes listed here. If a box isn't on the list, there's nowhere for someone to type that information — so a missing box means missing information later on."
            need: "Go through each form as if you were filling it in yourself. Is every piece of information you'd want to collect there — a phone number, a date, a note? And is anything private showing that shouldn't be?"
          advanced:
            what: "The input forms and the boxes on each."
            wont: "Unlisted boxes won't appear."
            need: "Confirm each form's boxes; flag any missing."

  views:
    what: "The composite views declared in views.yaml ({{count}} rows: the views package plus one row per view), each with its route, root entity, panels, and whether its copy is authored or raw."
    why: "Views are the read-side composition beyond raw CRUD — they're how related entities surface together, and unauthored (raw) copy is the words-layer gap you can close cheaply now."
    do: "Confirm the views cover the entities that need composite surfaces; note which views still render raw machine-name copy (view_prose not yet authored)."
    next: "→ Content, for which view copy is authored vs raw."
    audience:
      end_user:
        title: "Overviews"
        what: "Handy combined screens that pull related information together on one page — like a dashboard."
        wont: "These are extras on top of the basic lists; without them, people still see each thing on its own."
        need: "Note any overview you'd find useful that isn't here yet."
        do: "Check whether the combined views cover the things you'd want to see together."
        next: "→ see which of these still need their words written."
        fluency:
          beginner:
            what: "Extra screens that gather related information into one place, so you can see it all together instead of hopping between pages — a bit like the dashboard in a car showing several things at a glance."
            wont: "These are helpful extras on top of the basic lists. Even without them, people can still see each thing on its own page — you just won't get the combined view."
            need: "Think about what you'd like to see side by side on one screen. Note any combined overview that would be useful but isn't here yet."
          advanced:
            what: "Combined screens that show related things together, like a dashboard."
            wont: "Extras on top of the basic lists; each thing is still viewable on its own."
            need: "Note any useful overview that's missing."

  display:
    what: "The presentation-structure overlay from display.yaml ({{status}}): per-entity title/section/column bindings and which machine-id columns are hidden — visibility only, emits no new files."
    why: "Display shapes how entities and views READ (labels, column order, hidden ids) without changing the contract — absent, generators fall back to raw field order and ids-as-labels."
    do: "If present, confirm the column omissions and label fields match how you want records to read; if absent, decide whether the raw defaults are good enough to ship."
    next: "→ Views, whose read-surfaces this styles."
    audience:
      end_user:
        title: "Labels & layout"
        what: "How your information is labelled and arranged on screen — the headings, the order of columns, what's shown or hidden."
        wont: "This only affects how things look and read — it doesn't change what information is stored."
        need: "Confirm the labels and layout read clearly to someone seeing them for the first time."
        do: "Check the headings and column order make sense at a glance."
        next: "→ next, the words that still need writing."
        fluency:
          beginner:
            what: "How your information is named and arranged on screen — the headings people read, which columns come first, and what's shown or tucked out of the way. It's the difference between a tidy, easy-to-read page and a cluttered one."
            wont: "This only changes how things look and read on screen. It doesn't change what information is actually kept — nothing is added or lost, just presented differently."
            need: "Imagine someone seeing these screens for the very first time. Do the headings and the order things appear in make sense to them straight away?"
          advanced:
            what: "How information is labelled and arranged — headings, column order, what's hidden."
            wont: "Affects only how it reads, not what's stored."
            need: "Confirm it reads clearly to a first-time viewer."

  content:
    what: "The optional content inputs the manifests reference ({{status}}): page bodies and AI prompt files, each scored authored / placeholder / not-defined — visibility only, never gated."
    why: "This is the words layer for pages and prompts — placeholder or missing content is the intended starting state, but it's also the authoring work still outstanding before handoff."
    do: "Scan for not-defined or placeholder bodies/prompts you intended to author; this is honestly scored, never a gate, so treat it as a to-do list, not a blocker."
    next: "→ Completeness, the scored data-readiness signals."
    audience:
      end_user:
        title: "Content needed"
        what: "The parts of the app that need real words — page text and instructions — that only you can write."
        wont: "The app won't write these for you; they stay blank until someone fills them in."
        need: "Plan to write anything still marked 'placeholder' or left empty before you launch."
        do: "Scan for blanks and placeholders — that's your writing to-do list."
        next: "→ see how much is written versus still blank."
        fluency:
          beginner:
            what: "The places in your app that still need real words written — things like the text on a page or the instructions people read. These are the parts only you (or your team) can write, because they're about what you want to say."
            wont: "The app won't write this text for you. Anywhere that needs words will simply stay blank until a person fills it in — so a blank left here shows up as a blank in the finished app."
            need: "Make a plan to write anything still marked as a rough draft ('placeholder') or left empty, before you launch. Think of it as your writing to-do list."
          advanced:
            what: "The parts that still need real words — page text and instructions — only you can write."
            wont: "The app won't write them; blanks stay blank."
            need: "Write anything still placeholder or empty before launch."

  completeness:
    what: "The completeness signals ({{status}}): the scored (core) entities the human must judge vs. the excluded (derived / AI-output) set that's scored automatically."
    why: "The core-vs-derived split is what makes 'is the shape right?' glance-approvable — it separates the counts you must judge from the ones the cascade derives for you."
    do: "Confirm the scored (core) signals are the entities whose completeness actually matters, and that the excluded set is genuinely derived/AI-output, not something you forgot to score."
    next: "→ last section — approve the contract above, or revise and re-run."
    audience:
      end_user:
        title: "What's left"
        what: "A quick read on which parts are ready to go and which still need a decision or some information from you."
        wont: "This won't fix anything for you — it just points out what's still waiting on you."
        need: "Work through anything flagged as still needing your input."
        do: "Treat the flagged items as a short to-do list before you give the go-ahead."
        next: "→ that's the end — if it all looks right, you're ready to approve."
        fluency:
          beginner:
            what: "A quick summary of which parts of your app are ready to go, and which ones are still waiting on a decision or a bit more information from you — like a checklist near the finish line showing what's ticked off and what isn't."
            wont: "This part won't fix or finish anything by itself. It only points out what's still waiting on you, so nothing important slips through before you go ahead."
            need: "Work through anything flagged as still needing your input. Once those are handled, you're in good shape to approve."
          advanced:
            what: "A quick read on what's ready and what still needs you."
            wont: "It won't fix anything — just flags what's outstanding."
            need: "Handle anything flagged as needing your input."


  # FR-DL-12: the SUMMARY record — the aggregate what/why for the counts (routed through --describe
  # to give the Status/Shape/Content/Cascade header its meaning). Authored without live placeholders;
  # the numbers are already in the header lines above, so this carries the MEANING, not the figures.
  summary:
    what: "The whole planned app at a glance — the counts, health, content-readiness, and cascade readiness above."
    why: "These are your glance-approve: the entity count IS the contract (~89% of the app), the core-vs-derived split (Completeness) is the one real decision, and the content % is handoff-readiness."
    do: "Read top-down — healthy (Status), right size/shape (Shape + core/derived), content-ready (Content), runnable (Cascade)? Approve if yes; if a number surprises you, drill the section below."
    audience:
      end_user:
        headline: "Let's make sure this is the app you want."
        lead: "Below is everything your app will include, in plain language. Read down the page and check it matches what you had in mind — changing something now is quick and free; changing it once it's built is neither."
        steps:
          - "Check the things your app remembers are all here."
          - "Open a form and make sure no box you need is missing."
          - "Look for anything marked “needs you” — that's your short to-do."
        closing: "One last thing: is anything you expected NOT here at all? This list only shows what's been planned so far, so if something's missing entirely, now's the moment to say so. If it all looks right, you're ready to go ahead."
        fluency:
          beginner:
            lead: "Below is everything your app will include, written in plain language — no technical terms. Think of it like looking over the drawings for a house before it's built. Read slowly from the top and, for each part, ask yourself one simple question: is this what I pictured? Changing anything now is quick and free."
          advanced:
            lead: "Everything your app will include, in plain language. Skim it, confirm it matches what you intended, and flag anything missing — cheapest to fix now."