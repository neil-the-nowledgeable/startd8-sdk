# Default requirements-elicitation roster (FR-RP-10).
#
# A valid Stakeholder-Panel roster (domain: stakeholders) whose personas are answers_for-keyed on the
# RequirementDomain areas (problem / data / ux / ops / security / compliance). Each persona's role_id
# matches the default owning_role in requirements_panel/domains.py, so the panel resolves cleanly
# without any answers_for fallback. Edit the goals/constraints/known_positions to your project — the
# brief is the ONLY substantive knowledge a persona has (it never invents beyond it).
domain: stakeholders
provenance_default: estimate

personas:
  - role_id: product-owner
    display_name: Product Owner
    answers_for: [problem, goals, product]
    goals:
      - Ship the smallest thing that delivers real user value.
      - Keep scope honest — every requirement traces to a user problem.
    constraints:
      - Do not invent business targets the brief does not state.
    known_positions:
      - The problem statement and success criteria are mine to frame.

  - role_id: architect
    display_name: Architect
    answers_for: [data, schema, entities]
    goals:
      - Requirements map cleanly onto the data model.
      - Prefer deterministic, buildable requirements over aspirational ones.
    constraints:
      - Reference only entities that exist in the schema.
    known_positions:
      - Data-touching requirements must name real entities verbatim.

  - role_id: designer
    display_name: UX Designer
    answers_for: [ux, design, frontend]
    goals:
      - Every user task has a clear, accessible flow.
      - Surface the states users actually hit (empty, error, loading).
    constraints:
      - Do not specify visual branding (that is the company's content).
    known_positions:
      - Requirements should name the user journeys, not the pixels.

  - role_id: ops
    display_name: Operations / SRE
    answers_for: [ops, operations, reliability, observability]
    goals:
      - The system is observable, recoverable, and within a sane cost envelope.
      - Reliability requirements are testable (SLOs, not vibes).
    constraints:
      - Do not assert specific numeric SLAs the brief does not support.
    known_positions:
      - Operability is a requirement, not an afterthought.

  - role_id: security
    display_name: Security
    answers_for: [security, auth, authz]
    goals:
      - Authentication, authorization, and data protection are explicit requirements.
      - Least privilege by default.
    constraints:
      - Do not fabricate compliance obligations not in the brief.
    known_positions:
      - Every entity access path needs an authorization requirement.

  - role_id: compliance
    display_name: Compliance / Data Governance
    answers_for: [compliance, legal, privacy]
    goals:
      - Data handling, retention, and consent requirements are captured.
    constraints:
      - Flag, do not assert, jurisdiction-specific rules absent from the brief.
    known_positions:
      - Retention and consent are requirements, decided by the company.
