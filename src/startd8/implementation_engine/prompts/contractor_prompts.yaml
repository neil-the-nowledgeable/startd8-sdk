# Consolidated contractor prompt templates.
#
# Single source of truth for spec, draft, and review prompts.
# Replaces the former per-workflow prompt YAMLs and implementation_engine.yaml.
#
# Design principles (modeled after micro_prime/prompt_builder.py):
#   - System prompts: 2-4 lines max (role + core constraint)
#   - User prompts: placeholders for context; no repeated instruction blocks
#   - Coding standards & provenance rules: injected once via system prompt,
#     NOT duplicated across user-prompt sections
#   - Domain-specific rules (Docker, gRPC): injected via context, not hardcoded

prompts:

  # ---------- SPEC PHASE (Primary Contractor) ----------

  spec:
    description: "Spec prompt — 8-section implementation specification"
    template: |
      You are a senior software architect creating an implementation specification.

      ## Task
      {task_description}
      {requirements_section}
      {context_sections}
      {critical_parameters_section}
      {forward_contracts_section}

      ## Constraints
      {domain_constraints}

      ## Output Format
      Provide an 8-section specification: Task Summary, Requirements,
      Technical Approach, Code Structure, Acceptance Criteria, Edge Cases,
      Constraints, Examples.
    placeholders:
      - task_description
      - requirements_section
      - context_sections
      - critical_parameters_section
      - forward_contracts_section
      - domain_constraints

  spec_from_design:
    description: "Spec from approved design doc — forwards verbatim, adds missing sections"
    template: |
      You are expanding an approved design document into a full implementation specification.

      ## Design Document (AUTHORITATIVE — include verbatim)
      {design_document}

      ## Task
      {task_description}
      {requirements_section}
      {context_sections}
      {critical_parameters_section}
      {forward_contracts_section}

      ## Constraints
      {domain_constraints}

      ## Instructions
      1. Forward ALL design document content into the appropriate sections (preserve structure and semantics)
      2. If the design document already covers a section (e.g. Technical Approach), use its version
      3. ADD sections only for gaps: Technical Approach, Code Structure, Acceptance Criteria, Edge Cases, Examples
      4. Do NOT paraphrase or rewrite design document content

      ## Output Format
      Provide an 8-section specification: Task Summary, Requirements,
      Technical Approach, Code Structure, Acceptance Criteria, Edge Cases,
      Constraints, Examples.
    placeholders:
      - design_document
      - task_description
      - requirements_section
      - context_sections
      - critical_parameters_section
      - forward_contracts_section
      - domain_constraints

  # ---------- DRAFT PHASE (Secondary Contractor) ----------

  draft:
    description: "Draft implementation from spec (greenfield)"
    template: |
      Implement the following specification.

      ## Specification
      {spec}

      ## Feedback
      {feedback}

      {existing_files_section}

      {supplementary_sections}

      ## Output Format
      {output_format}
    placeholders:
      - spec
      - feedback
      - output_format
      - existing_files_section
      - supplementary_sections

  draft_edit:
    description: "Draft implementation from spec (edit mode — existing files first)"
    template: |
      Modify the existing code per the specification below.

      {existing_files_section}

      ## Specification (changes to apply)
      {spec}

      ## Feedback
      {feedback}

      {supplementary_sections}

      ## Output Format
      {output_format}
    placeholders:
      - spec
      - feedback
      - output_format
      - existing_files_section
      - supplementary_sections

  # ---------- DRAFT SYSTEM PROMPTS (mode-aware, sparse) ----------

  draft_system_create:
    description: "System prompt — greenfield CREATE mode (language-parameterized)"
    template: |
      You are {language_role}. Implement the spec exactly.
      Output raw file content exactly as it should appear on disk. Do NOT wrap content in a script, generator, or any other meta-program.
      Complete implementations only — no stubs, TODOs, or pass bodies.
      Use parameter names from upstream documents verbatim. Do not rename them.
      Do not generate project boilerplate — only task-specific code.
      {coding_standards}
      {import_instruction}
    placeholders:
      - language_role
      - coding_standards

  draft_system_edit:
    description: "System prompt — whole-file EDIT mode (language-parameterized)"
    template: |
      You are {language_role} editing existing source code.
      Output raw file content exactly as it should appear on disk. Do NOT wrap content in a script, generator, or any other meta-program.
      PRESERVE all unchanged code. Output the COMPLETE modified file.
      Use parameter names from upstream documents verbatim. Do not rename them.
      {coding_standards}
      {import_instruction}
    placeholders:
      - language_role
      - coding_standards

  draft_system_search_replace:
    description: "System prompt — large-file EDIT mode (>= 50 lines, language-parameterized)"
    template: |
      You are {language_role} making targeted edits to large files.
      Output raw file content exactly as it should appear on disk. Do NOT wrap content in a script, generator, or any other meta-program.
      Minimal changes only. Output the COMPLETE modified file — every line.
      Use parameter names from upstream documents verbatim. Do not rename them.
      {coding_standards}
      {import_instruction}
    placeholders:
      - language_role
      - coding_standards

  draft_system_skeleton_fill:
    description: "System prompt — skeleton fill mode (FR-MPA-005, language-parameterized)"
    template: |
      You are {language_role} filling method bodies in pre-assembled skeleton files.
      Output raw file content exactly as it should appear on disk. Do NOT wrap content in a script, generator, or any other meta-program.
      Implement ONLY methods marked with {stub_marker}. Do not modify pre-filled elements.
      Use parameter names from upstream documents verbatim. Do not rename them.
      Preserve all imports, class structure, and pre-filled method bodies exactly as provided.
      {coding_standards}
      {import_instruction}
    placeholders:
      - language_role
      - coding_standards
      - stub_marker

  # ---------- DRAFT USER PROMPT — SKELETON FILL (FR-MPA-005) ----------

  draft_skeleton_fill:
    description: "Draft implementation from spec (skeleton fill — pre-assembled file with stubs)"
    template: |
      Fill the unfilled method bodies in the pre-assembled skeleton file below.

      ## Existing Skeleton
      The following file already exists with correct imports, class structure,
      and some method bodies pre-filled. Implement ONLY the method bodies
      marked as stubs.

      {skeleton_section}

      {pre_assembly_status}

      ## Specification (scope: unfilled elements only)
      {spec}

      ## Feedback
      {feedback}

      {supplementary_sections}

      ## Output Format
      {output_format}
    placeholders:
      - skeleton_section
      - pre_assembly_status
      - spec
      - feedback
      - output_format
      - supplementary_sections

  # ---------- REVIEW PHASE (Primary Contractor) ----------

  review:
    description: "Review prompt with convergent review support"
    template: |
      Review this implementation against the specification.

      ## Task
      {task_description}

      ## Specification
      {spec}

      {enrichment_sections}

      {prior_issues_section}

      ## Implementation
      {implementation}

      {convergence_instructions}

      ## Output Format
      ### Score: [0-100]
      ### Verdict: [PASS/FAIL] (PASS if score >= {pass_threshold} AND no BLOCKING issues)
      ### Strengths
      ### Issues
      List each issue as: - [BLOCKING] / [MAJOR] / [MINOR] description
      ### Suggestions
    placeholders:
      - task_description
      - spec
      - implementation
      - pass_threshold
      - enrichment_sections
      - prior_issues_section
      - convergence_instructions

  review_system:
    description: "System prompt for review agent"
    template: |
      You are a senior engineer reviewing code for correctness and completeness.
      Severity: BLOCKING (must fix), MAJOR (should fix), MINOR (nice to fix).
      Verify parameter names match upstream documents exactly — flag renames as BLOCKING.
      For edit-mode: verify existing code preserved. Flag removal as BLOCKING unless spec required it.
      Cross-check: if the implementation follows the spec but violates language coding standards (e.g. wildcard imports in Java, bare except in Python, unused imports in Go, Console.Write instead of ILogger in C#, var instead of const in Node.js), flag as MAJOR with a note that the coding standard takes precedence over the spec.
      Precedence rule — spec vs coding standards conflict:
        - SECURITY violations (SQL injection, credential leakage, path traversal, command injection): always BLOCKING, regardless of what the spec says. The spec cannot override security rules.
        - STYLE/QUALITY violations (Console.WriteLine instead of ILogger, print() instead of logging, fmt.Println instead of slog, System.out.println instead of SLF4J): flag as MAJOR. The coding standard takes precedence, but do NOT mark BLOCKING unless it compounds with a security issue.
        - When flagging a spec-vs-standard conflict, quote both the spec instruction and the violated standard so the user can fix the spec for future runs.
      Convergence: state RESOLVED or STILL OUTSTANDING for each prior issue.
    placeholders: []

  # ---------- INTEGRATION PHASE ----------

  integration:
    description: "Final integration polish"
    template: |
      Finalize this implementation for production.

      ## Task
      {task_description}

      ## Implementation
      {implementation}

      ## Review History
      {review_history}

      ## Instructions
      {integration_instructions}
      {multi_file_directive}

      Make final polish, then output the production-ready code in a fenced block.
    placeholders:
      - task_description
      - implementation
      - review_history
      - integration_instructions
      - multi_file_directive

  # ---------- FRAMING TEMPLATES ----------

  plan_context_edit_framing:
    description: "Plan context framing for edit tasks"
    template: |
      The following plan describes CHANGES to existing code. Do NOT treat as greenfield.
    placeholders: []

  plan_context_create_framing:
    description: "Plan context framing for create tasks"
    template: |
      The following plan provides context. The design document (if present) is authoritative.
    placeholders: []

  arch_context_edit_framing:
    description: "Architectural context framing for edit tasks"
    template: |
      Apply these architectural constraints to the existing file(s). Do not redesign.
    placeholders: []

  spec_edit_preamble_base:
    description: "Edit-mode spec preamble"
    template: |
      ## EDIT MODE
      **Task type: {task_verb}** existing code.
      Describe ONLY additions and modifications. List unchanged functions/classes.
      Specify exact insertion points.
    placeholders:
      - task_verb

  spec_edit_quantitative_constraint:
    description: "Line-count constraint for edit spec"
    template: |
      **Existing file(s): {total_lines} lines.** Draft must be >= {min_lines} lines ({edit_min_pct}%).
    placeholders:
      - total_lines
      - min_lines
      - edit_min_pct

  spec_create_preamble:
    description: "Create-mode spec preamble (PC-F3)"
    template: |
      ## CREATE MODE — New Implementation
      **Task type: Implement** this specification from scratch.

    placeholders: []

  available_imports:
    description: "Available imports section for spec — reduces post-generation import repair"
    template: |
      ## Available Imports

      The following packages are installed and available for import:

      {available_packages}

      {import_syntax}
    placeholders:
      - available_packages
      - import_syntax

  spec_completeness_warning:
    description: "Warning for missing spec parameters"
    template: |
      ## Spec Completeness Warning
      These parameters from requirements are NOT in the spec — include them:
      {missing_lines}
    placeholders:
      - missing_lines

  # ---------- CONTEXT SECTION TEMPLATES (R0-2) ----------

  required_output_files:
    description: "Multi-file task manifest for spec context"
    template: |
      ## Required Output Files
      This task produces MULTIPLE files. Your spec MUST describe the
      role and expected contents of EACH file:
      {file_manifest}

      In your Code Structure section, list each file separately with its
      classes/functions.
    placeholders:
      - file_manifest

  exemplar_reference:
    description: "Verified reference implementation from a prior run"
    template: |
      ## Verified Reference (from {run_id}, score: {score})
      The following implementation was generated by this pipeline for a
      structurally similar task ({fingerprint}) and scored {score} with
      full contract compliance. Use the same patterns, import structure,
      and architectural approach.
    placeholders:
      - run_id
      - score
      - fingerprint

  sibling_imports:
    description: "Imports used by sibling files in the same directory"
    template: |
      ## Imports Used by Sibling Files in This Directory
      The following imports are used by other files in this
      service. Use the same packages and import patterns
      where applicable:

      ```{fence_lang}
      {import_list}
      ```
    placeholders:
      - fence_lang
      - import_list

  local_modules:
    description: "Available local modules for bare import"
    template: |
      ## Available Local Modules
      These files exist in the SAME directory as the file you are generating.
      Import from them using their module name (bare import, NOT qualified):

      {module_list}

      Do NOT use qualified imports like `from servicename.module import X`.
      Use bare `from module import X` since these are sibling files.
    placeholders:
      - module_list

  # ---------- OUTPUT FORMAT TEMPLATES ----------

  single_file_output:
    description: "Output format for single-file tasks"
    template: |
      Provide the COMPLETE file content in a single fenced code block — not a program that generates it.
    placeholders: []

  multi_file_output:
    description: "Output format for multi-file tasks"
    template: |
      Produce a SEPARATE fenced code block for each file. First line comment = file path.

      REQUIRED files:
      {file_list}

      Format per file:
      ```
      # <full path>
      <implementation>
      ```

      Checklist — verify each file has a block:
      {file_checklist}

      Rules: Every file gets its own block. No skipping. Each block contains raw file content — not a program that generates it.
    placeholders:
      - file_list
      - file_checklist

  single_file_edit_output:
    description: "Output format for single-file edit tasks (PC-Q2)"
    template: |
      Output the COMPLETE modified file ({existing_line_count} lines original).
      Your draft must be AT LEAST {min_output_lines} lines ({min_pct}% of existing).
      Do NOT omit or abbreviate existing code.
    placeholders:
      - existing_line_count
      - min_output_lines
      - min_pct

  multi_file_edit_output:
    description: "Output format for multi-file edit tasks"
    template: |
      Output COMPLETE modified files — every line of original plus changes.
      {existing_line_summary}

      REQUIRED files:
      {file_list}

      Format per file:
      ```
      # <full path>
      <complete modified file>
      ```

      Checklist:
      {file_checklist}

      Rules: every file gets its own block. Preserve all existing code.
    placeholders:
      - file_list
      - file_checklist
      - existing_line_summary
