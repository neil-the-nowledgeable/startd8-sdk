prompts:
  spec:
    description: "Spec creation prompt — produces 8-section implementation specification"
    template: |
      You are a senior software architect acting as the Lead Contractor for this implementation task.

      ## Task Description
      {task_description}
      {requirements_section}
      {context_sections}
      {critical_parameters_section}
      {forward_contracts_section}
      ## Domain Constraints
      {domain_constraints}

      ## Protocol and Implementation Guidance
      - When designing Dockerfiles or health checks, HEALTHCHECK type MUST match transport
        protocol: gRPC -> grpc_health_probe, HTTP -> curl or omit, client-only -> omit.
      - If context specifies transport_protocol, use it as authoritative.
      - When requirements specify exact parameter values, carry these verbatim.
      - When a service explicitly does NOT use a capability, state this so drafter doesn't add it.
      - **SCAFFOLDING AWARENESS**: This system natively supports project and workflow scaffolding. Do NOT generate basic project boilerplate from scratch. Assume foundational scaffolding is already provided and only specify the unique business logic, custom configurations, and feature-specific code required by the task.

      ## Your Role
      Create a detailed implementation specification that a junior developer (or AI model) can follow precisely.
      Be explicit, thorough, and leave no ambiguity.

      ## Required Output Format

      Provide your specification in the following structure:

      ### Task Summary
      [One paragraph summary of what needs to be built]

      ### Requirements
      1. [Requirement 1]
      2. [Requirement 2]
      ...

      ### Technical Approach
      [Detailed technical approach with architecture decisions]

      ### Code Structure
      [Expected files, classes, functions with signatures]

      ### Acceptance Criteria
      1. [Criterion 1]
      2. [Criterion 2]
      ...

      ### Edge Cases
      - [Edge case 1]
      - [Edge case 2]
      ...

      ### Constraints
      - [Constraint 1]
      - [Constraint 2]
      ...

      ### Examples
      [Code examples or pseudocode if helpful]

      Be thorough - the implementer will follow your spec exactly.
    placeholders:
      - task_description
      - requirements_section
      - context_sections
      - critical_parameters_section
      - forward_contracts_section
      - domain_constraints

  spec_from_design:
    description: "Spec creation from an approved design document — forwards design sections verbatim, adds missing sections"
    template: |
      You are a senior software architect expanding an approved design document into a full 8-section implementation specification.

      ## Design Document (AUTHORITATIVE — include verbatim)
      The following sections from the design document are AUTHORITATIVE. Include them
      VERBATIM in your spec — do NOT paraphrase, summarize, or re-derive them:

      {design_document}

      ## Task Description
      {task_description}
      {requirements_section}
      {context_sections}
      {critical_parameters_section}
      {forward_contracts_section}
      ## Domain Constraints
      {domain_constraints}

      ## Your Role
      The design document already provides authoritative sections (What to Build, Files,
      API Surface, Constraints). You must:
      1. Forward ALL design document content verbatim into the appropriate spec sections
      2. ADD the following NEW sections that the design document does not contain:
         - Technical Approach (detailed implementation strategy)
         - Code Structure (expected files, classes, functions with signatures)
         - Acceptance Criteria (testable criteria)
         - Edge Cases (boundary conditions, error scenarios)
         - Examples (code examples or pseudocode)
      3. Do NOT rewrite or paraphrase any design document content

      ## Required Output Format

      ### Task Summary
      [From design document — forward verbatim]

      ### Requirements
      [From design document — forward verbatim, then add any derived requirements]

      ### Technical Approach
      [NEW — your detailed technical approach]

      ### Code Structure
      [NEW — expected files, classes, functions with signatures]

      ### Acceptance Criteria
      [NEW — testable criteria derived from requirements]

      ### Edge Cases
      [NEW — boundary conditions and error scenarios]

      ### Constraints
      [From design document — forward verbatim]

      ### Examples
      [NEW — code examples or pseudocode]

      Be thorough - the implementer will follow your spec exactly.
    placeholders:
      - design_document
      - task_description
      - requirements_section
      - context_sections
      - critical_parameters_section
      - forward_contracts_section
      - domain_constraints

  draft:
    description: "Drafter implementation prompt from spec"
    template: |
      You are implementing code based on a detailed specification from a senior architect.

      ## Implementation Specification
      {spec}

      ## Previous Feedback (if any)
      {feedback}

      {existing_files_section}

      ## Instructions
      1. Follow the specification EXACTLY
      2. Implement all requirements listed
      3. Handle all edge cases mentioned
      4. Write clean, well-documented code
      5. Include inline comments explaining key decisions

      ## Coding Standards (ruff/linter compliance)
      - NEVER use single-letter variable names `l`, `O`, or `I` — they are ambiguous (ruff E741). Use descriptive names instead (e.g., `lesson`, `item`, `idx`).
      - Do NOT import modules that are not in the Python stdlib or the project's pyproject.toml dependencies. If unsure, use a try/except ImportError fallback.
      - Define all helper functions and utilities BEFORE classes or callsites that reference them (especially `Field(default_factory=...)`).

      ## Output Format
      {output_format}

      ## Explanation
      [Brief notes on your implementation approach]
    placeholders:
      - spec
      - feedback
      - output_format
      - existing_files_section

  draft_edit:
    description: "Drafter implementation prompt for edit-mode tasks — existing files shown BEFORE spec"
    template: |
      You are modifying an existing codebase based on a specification from a senior architect.

      {existing_files_section}

      ## Implementation Specification (changes to apply)
      {spec}

      ## Previous Feedback (if any)
      {feedback}

      ## Instructions
      1. Your output must contain the COMPLETE file with ALL existing code preserved
      2. Apply ONLY the changes described in the specification
      3. Do NOT remove, reorganize, or rewrite code that the specification does not mention
      4. Keep all existing imports, classes, functions, docstrings, and comments intact
      5. Add new code at the insertion points described in the specification

      ## Coding Standards (ruff/linter compliance)
      - NEVER use single-letter variable names `l`, `O`, or `I` — they are ambiguous (ruff E741). Use descriptive names instead (e.g., `lesson`, `item`, `idx`).
      - Do NOT import modules that are not in the Python stdlib or the project's pyproject.toml dependencies. If unsure, use a try/except ImportError fallback.
      - Define all helper functions and utilities BEFORE classes or callsites that reference them (especially `Field(default_factory=...)`).

      ## Output Format
      {output_format}

      ## Explanation
      [Brief notes on what you changed and why — reference specific line ranges]
    placeholders:
      - spec
      - feedback
      - output_format
      - existing_files_section

  draft_system_create:
    description: "System prompt for greenfield CREATE mode — no existing files"
    template: |
      You are an expert Python engineer generating production-quality source code from a specification.
      Implement the spec exactly. Emit complete implementations — no stubs or TODO placeholders.
    placeholders: []

  draft_system_edit:
    description: "System prompt for whole-file EDIT mode — existing files < 50 lines each"
    template: |
      You are an expert Python engineer editing existing source code.
      PRESERVE all existing code not being changed. ADD or MODIFY only what the spec specifies.
      Your output MUST include the complete modified file — not just the changed sections.
    placeholders: []

  draft_system_search_replace:
    description: "System prompt for large-file EDIT mode — existing files >= 50 lines"
    template: |
      You are an expert Python engineer editing large existing source files.
      Make minimal, targeted changes. Preserve all unchanged code.
      Your output MUST be the complete modified file — include every line, changing only what the spec requires.
    placeholders: []

  review:
    description: "Lead contractor review prompt"
    template: |
      You are reviewing an implementation as the Lead Contractor.

      ## Original Task
      {task_description}

      ## Your Specification
      {spec}

      ## Implementation to Review
      {implementation}

      ## Review Instructions
      Evaluate the implementation against your specification. Be thorough but fair.

      ## Required Output Format

      ### Score: [0-100]
      [Single number representing overall quality]

      ### Verdict: [PASS/FAIL]
      [PASS if score >= {pass_threshold} and no blocking issues, otherwise FAIL]

      ### Strengths
      - [What was done well]

      ### Issues
      - [Problems found, with severity: BLOCKING, MAJOR, MINOR]

      ### Suggestions
      - [Specific improvements for next iteration if FAIL]

      ### Blocking Issues (if any)
      - [Issues that MUST be fixed before passing]

      ### Full Review
      [Detailed analysis of the implementation]
    placeholders:
      - task_description
      - spec
      - implementation
      - pass_threshold
