# Importance-scaled SLO default thresholds — single source of truth for the VALUES.
# Design: docs/design/importance-scaled-slo/ (FR-7 single overridable table).
#
# Structure: <criticality>.<deployment_mode|default>.{availability, latency_p99}
#   - `default` = no deployment-mode signal (Increment 1). Increment 2 adds `installed`/`deployed`
#     sub-keys under each criticality (they fall back to `default` when absent).
#   - Only `availability` and `latency_p99` participate (FR-2b) — `throughput` is a capacity fact and
#     is intentionally omitted here, so it falls through to the flat default.
#   - MONOTONIC (FR-2a): raising criticality must never loosen a field (availability non-decreasing,
#     latency non-increasing). `medium.default` deliberately equals the flat default (value unchanged).
#
# Override precedence: a project may override any cell in its ContextManifest under
#   spec.observability.importanceThresholds: { high: { default: { availability: "99.7" } } }
# which is deep-merged over these base values (obs_config.load_importance_thresholds).

schema_version: 1

critical:
  default: { availability: "99.9", latency_p99: "300ms" }
high:
  default: { availability: "99.5", latency_p99: "400ms" }
medium:
  default: { availability: "99", latency_p99: "500ms" }
low:
  default: { availability: "99", latency_p99: "1s" }
