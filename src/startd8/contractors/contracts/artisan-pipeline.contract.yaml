# =============================================================================
# Artisan Pipeline Context Propagation Contract
# =============================================================================
# Declares what context fields each phase requires, produces, and which
# enrichment fields must propagate end-to-end through the pipeline.
#
# Schema: contextcore.contracts.propagation.schema.ContextContract
# Version convention follows Weaver (start at 0.1.0 to signal instability).
# =============================================================================

schema_version: "0.4.0"
pipeline_id: artisan
description: >
  Context propagation contract for the 8-phase Artisan contractor workflow.
  Defines entry/exit requirements per phase and three end-to-end propagation
  chains for domain classification, validator routing, and calibration.

phases:

  plan:
    description: "Preflight checks + plan deconstruction"
    entry:
      required:
        - name: project_root
          type: str
          severity: blocking
          description: "Absolute path to project root directory"
    exit:
      required:
        - name: enriched_seed_path
          type: str
          severity: blocking
          description: "Path to the enriched seed YAML file"
        - name: tasks
          type: list
          severity: blocking
          description: "List of SeedTask objects from plan deconstruction"
        - name: task_index
          type: dict
          severity: blocking
          description: "Task ID to SeedTask mapping for O(1) lookups"
        - name: plan_title
          type: str
          severity: blocking
        - name: plan_goals
          type: list
          severity: blocking
        - name: domain_summary
          type: dict
          severity: blocking
          description: "Domain classification results from preflight"
        - name: preflight_summary
          type: dict
          severity: blocking
        - name: total_estimated_loc
          type: int
          severity: blocking
      optional:
        - name: architectural_context
          type: dict
          severity: advisory
        - name: design_calibration
          type: dict
          severity: advisory
          description: "Calibration data for output size limits"
        - name: example_artifacts
          type: dict
          severity: advisory
        - name: wave_assignments
          type: dict
          severity: advisory
          description: "task_id -> wave_index mapping from dependency-depth BFS"
        - name: wave_metadata
          type: dict
          severity: advisory
          description: "wave_count, wave_summary, critical_path_length"
        - name: service_metadata
          type: dict
          severity: advisory
        - name: plan_document_text
          type: string
          severity: advisory
        - name: onboarding_calibration_hints
          type: any
          severity: advisory
        - name: onboarding_dependency_graph
          type: any
          severity: advisory
        - name: project_metadata
          type: dict
          severity: advisory
          description: "Operational project metadata (criticality, risks, SLOs) from .contextcore.yaml"

  scaffold:
    description: "Lessons discovery and project scaffolding"
    entry:
      required:
        - name: tasks
          type: list
          severity: blocking
        - name: task_index
          type: dict
          severity: blocking
        - name: project_root
          type: str
          severity: blocking
    exit:
      required:
        - name: scaffold
          type: dict
          severity: blocking
          description: "Scaffold results with directories_needed, directories_created, project_root"

  design:
    description: "Design documentation generation"
    entry:
      required:
        - name: tasks
          type: list
          severity: blocking
        - name: task_index
          type: dict
          severity: blocking
      enrichment:
        - name: scaffold.existing_target_files
          type: list
          severity: warning
          default: []
          source_phase: scaffold
          description: "List of target files that already exist on disk (populated by ScaffoldPhaseHandler)"
        - name: scaffold.staleness_classification
          type: dict
          severity: advisory
          source_phase: scaffold
          description: "Per-file staleness classification (fresh/stale/unknown) from scaffold phase"
        - name: lane_assignments
          type: dict
          severity: advisory
          description: "Per-task lane assignments from compute_lanes(). Advisory — DESIGN falls back to flat iteration if absent."
        - name: wave_assignments
          type: dict
          severity: advisory
          description: "Per-task wave indices for lane-internal ordering."
        - name: plan_document_text
          type: string
          severity: advisory
          source_phase: plan
          description: "Full plan document text from TRANSFORM phase for FOUNDATION prefix injection (REQ-PD-001)"
        - name: complexity_dimensions
          type: dict
          severity: advisory
          source_phase: plan
          description: "Per-dimension complexity scores from ASSESS phase for depth calibration (REQ-PD-002)"
        - name: onboarding_refine_suggestions
          type: any
          severity: advisory
          source_phase: plan
          description: "Structured REFINE triage suggestions for design elaboration (REQ-PD-006)"
        - name: wave_metadata
          type: dict
          severity: advisory
          source_phase: plan
          description: "Wave execution metadata (wave_count, wave_summary, critical_path_length) for context accumulation (REQ-PD-008)"
    exit:
      required:
        - name: design_results
          type: dict
          severity: blocking
          quality:
            metric: section_count
            threshold: 2
            on_below: warning
            description: "Design output should have at least 2 sections (architecture + implementation notes)"
      optional:
        - name: design_results.*.design_mode
          type: str
          description: "Per-task design mode: 'create' (new file) or 'update' (existing file). Default 'create' for backward compatibility."
        - name: design_results.*.lane_index
          type: int
          description: "Lane index assigned to this task during DESIGN."
        - name: design_results.*.wave_index
          type: int
          description: "Wave index used for lane-internal ordering."
        - name: shared_file_manifest
          type: dict
          description: "Per-file map of contesting task IDs. Empty dict if no shared files."
        - name: lane_conflicts
          type: list
          description: "Post-lane compatibility check results. Empty list if no conflicts."

  implement:
    description: "Test construction + code development"
    entry:
      required:
        - name: tasks
          type: list
          severity: blocking
        - name: design_results
          type: dict
          severity: blocking
          quality:
            metric: line_count
            threshold: 50
            on_below: warning
            description: "Design doc should have substance (>= 50 lines); warning only since quality extractors measure str(dict)"
      enrichment:
        - name: design_results.*.design_mode
          type: str
          severity: warning
          default: "create"
          source_phase: design
          description: "Per-task design mode ('create' or 'update') from AR-127. When 'update', IMPLEMENT adds prompt constraints for incremental-only output."
        - name: domain_summary.domain
          type: str
          severity: warning
          default: "unknown"
          source_phase: plan
          description: "Domain classification from preflight (e.g. web_application, data_pipeline)"
        - name: domain_summary.prompt_constraints
          type: list
          severity: warning
          default: []
          source_phase: plan
          description: "Domain-specific prompt constraints for code generation"
        - name: domain_summary.post_generation_validators
          type: list
          severity: warning
          default: []
          source_phase: plan
          description: "Domain-specific validators to run after code generation"
        - name: design_calibration
          type: dict
          severity: advisory
          source_phase: plan
          description: "Output size calibration data (max_output_tokens, etc.)"
        - name: service_metadata
          type: dict
          severity: warning
          default: null
          source_phase: plan
          description: "Service metadata for protocol/dep compliance in code generation"
        - name: architectural_context
          type: dict
          severity: advisory
          source_phase: plan
          description: "Project architecture for code generation context"
        - name: project_name
          type: str
          severity: advisory
          source_phase: plan
          description: "Project name derived from plan_title or project_root dirname (PCA-501)"
        - name: existing_file_contents
          type: dict
          severity: advisory
          source_phase: implement
          description: "Per-file existing production code read from project_root (PCA-502/503)"
        - name: scaffold.module_inventory
          type: list
          severity: warning
          default: []
          source_phase: scaffold
          description: "Importable Python package names from SCAFFOLD directory walk (AR-821). Prevents LLM from hallucinating imports."
    exit:
      required:
        - name: implementation
          type: dict
          severity: blocking
        - name: generation_results
          type: dict
          severity: blocking
          quality:
            metric: line_count
            threshold: 10
            on_below: warning
            description: "Generation results should have meaningful content"
        - name: truncation_flags
          type: dict
          severity: warning
          description: >-
            Per-task truncation detection results from Gate 4.
            Tasks with truncation_blocked=true are blocking at INTEGRATE
            (AR-816: file merge skipped for those tasks).
      optional:
        - name: edit_first_gate_results
          type: dict
          severity: advisory
          description: "Per-task edit-first enforcement gate results from Gate 5 (REQ-EFE-020). Empty when all files are new."
        - name: onboarding_schema_features
          type: dict
          severity: advisory
          description: "Schema features from ContextCore onboarding for edit-first threshold resolution (REQ-EFE-021)"

  integrate:
    description: "Merge staged generated code into project root with validation and rollback"
    entry:
      required:
        - name: generation_results
          type: dict
          severity: blocking
          description: "Per-task generation results with staged file paths"
      enrichment:
        - name: _staging_dir
          type: str
          severity: warning
          default: ""
          source_phase: implement
          description: "Path to staging directory (falls back to .startd8/staging/)"
    exit:
      required:
        - name: integration_results
          type: dict
          severity: blocking
          description: "Per-task integration outcomes (success, files, errors)"
          quality:
            metric: success_rate
            threshold: 0.5
            on_below: warning
            description: "At least half of integration results should have success=true"

  test:
    description: "Final testing and validation"
    entry:
      required:
        - name: tasks
          type: list
          severity: blocking
        - name: generation_results
          type: dict
          severity: blocking
          quality:
            metric: line_count
            threshold: 10
            on_below: warning
            description: "Generation results entering TEST should not be empty stubs"
      enrichment:
        - name: domain_summary.post_generation_validators
          type: list
          severity: warning
          default: []
          source_phase: plan
          description: "Validators routed from plan phase for test execution"
        - name: truncation_flags
          type: dict
          severity: warning
          default: {}
          source_phase: implement
          description: "Per-task truncation detection results for test annotation"
    exit:
      required:
        - name: test_results
          type: dict
          severity: blocking
          quality:
            metric: total_passed
            threshold: 1
            on_below: warning
            description: "At least one task should pass its validators"

  review:
    description: "Final assembly and validation"
    entry:
      required:
        - name: generation_results
          type: dict
          severity: blocking
          quality:
            metric: line_count
            threshold: 10
            on_below: warning
            description: "Generation results entering REVIEW should have substance"
      enrichment:
        - name: truncation_flags
          type: dict
          severity: warning
          default: {}
          source_phase: implement
          description: "Per-task truncation detection results for review annotation"
        - name: service_metadata
          type: dict
          severity: advisory
          source_phase: plan
          description: "Service metadata for protocol compliance review"
        - name: project_context
          type: dict
          severity: advisory
          source_phase: plan
          description: "Project-level context (plan_title, plan_goals, architectural_context)"
        - name: project_name
          type: str
          severity: advisory
          source_phase: plan
          description: "Project name for review context identification (PCA-505)"
    exit:
      required:
        - name: review_results
          type: dict
          severity: blocking
          quality:
            metric: total_passed
            threshold: 1
            on_below: warning
            description: "At least one task should pass review"
          evaluation:
            required: true
            policy: any_evaluator
            on_unevaluated: warning
            on_below_threshold: advisory

  finalize:
    description: "Retrospective, lessons learned, propagation validation"
    entry:
      required:
        - name: tasks
          type: list
          severity: blocking
        - name: generation_results
          type: dict
          severity: blocking
      enrichment:
        - name: truncation_flags
          type: dict
          severity: warning
          default: {}
          source_phase: implement
          description: "Per-task truncation detection results for summary inclusion"
    exit:
      required:
        - name: workflow_summary
          type: dict
          severity: blocking

# =============================================================================
# Propagation Chains
# =============================================================================
# End-to-end field flow declarations.  Each chain tracks a field from its
# source phase through waypoints to its destination.

propagation_chains:

  - chain_id: domain_to_implement
    description: >
      Domain classification flows from plan preflight to implement phase
      where it constrains code generation prompts.
    source:
      phase: plan
      field: domain_summary.domain
    waypoints: []
    destination:
      phase: implement
      field: domain_summary.domain
    severity: warning
    verification: "dest not in (None, '', 'unknown')"

  - chain_id: validators_to_test
    description: >
      Post-generation validators flow from plan enrichment through implement
      to the test phase where they are resolved and executed.
    source:
      phase: plan
      field: domain_summary.post_generation_validators
    waypoints:
      - phase: implement
        field: domain_summary.post_generation_validators
    destination:
      phase: test
      field: domain_summary.post_generation_validators
    severity: warning

  - chain_id: calibration_to_implement
    description: >
      Design calibration data flows from plan to implement where it sets
      max_output_tokens and other generation constraints.
    source:
      phase: plan
      field: design_calibration
    destination:
      phase: implement
      field: design_calibration
    severity: advisory

  - chain_id: truncation_to_finalize
    description: >
      Per-task truncation detection results flow from implement through
      test and review to finalize, where they appear in the workflow summary.
    source:
      phase: implement
      field: truncation_flags
    waypoints:
      - phase: test
        field: truncation_flags
      - phase: review
        field: truncation_flags
    destination:
      phase: finalize
      field: truncation_flags
    severity: warning

  - chain_id: design_mode_to_implement
    description: >
      Per-task design mode summary flows from design phase to implement phase.
      Derived from design_results status values by DesignPhaseHandler.
    source:
      phase: design
      field: design_mode_summary
    destination:
      phase: implement
      field: implementation.metadata.design_mode_summary
    severity: warning

  - chain_id: onboarding_context_to_implement
    description: >
      Project-level onboarding context flows from plan through implement
      for protocol compliance and architectural alignment.
    source:
      phase: plan
      field: service_metadata
    waypoints: []
    destination:
      phase: implement
      field: implementation.metadata.service_metadata
    severity: warning

  - chain_id: project_metadata_to_review
    description: >
      Project operational metadata (criticality, risks, SLOs) flows from plan
      through all downstream phases for quality-tier-aware generation and review.
    source:
      phase: plan
      field: project_metadata
    waypoints: []
    destination:
      phase: review
      field: project_metadata
    severity: advisory
